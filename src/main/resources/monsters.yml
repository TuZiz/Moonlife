# 原版轻生态怪物配置：默认只使用 Bukkit / Paper 原版实体，不依赖 MythicMobs。
rules:
  # 满月僵尸群：满月夜晚会在荒野附近出现，强度轻量，适合原版生存服。
  fullmoon_zombie_pack:
    # 规则唯一 ID。
    id: fullmoon_zombie_pack
    # 玩家可见的怪物规则中文名，不影响内部规则 ID。
    display-name: "满月僵尸群"
    # 是否启用该规则或相位文件。
    enable: true
    # 刷怪后端，轻生态默认使用原版实体。
    spawn-backend: VANILLA
    # 原版实体类型。
    vanilla-entity: ZOMBIE
    # 规则生效的世界列表，留空表示不限制。
    worlds: [world]
    # 规则生效的群系列表，留空表示不限制。
    biomes: []
    # 规则直接绑定的月相列表，通常建议在 moon-phases 目录中配置。
    moon-phases: []
    # 规则直接绑定的日相列表，通常建议在 solar-phases 目录中配置。
    solar-phases: []
    # 规则生效的天气列表。
    weather: [CLEAR, RAIN, THUNDER]
    # 允许刷怪或生效的 Y 坐标范围。
    y-range: [-32, 120]
    # 允许刷怪或生效的光照范围。
    light-range: [0, 7]
    # 地形条件，支持 SURFACE、UNDERGROUND、ANY。
    terrain: SURFACE
    # 是否只在荒野区域生效。
    wilderness-only: true
    # 附近玩家数量上限。
    nearby-player-limit: 6
    # 统计附近玩家数量的半径。
    nearby-player-radius: 44.0
    # 单区块生态实体数量上限。
    chunk-limit: 4
    # 单世界生态实体数量上限。
    world-limit: 64
    # 规则冷却时间，单位为 tick。
    cooldown: 520
    # 权重，数值越高越容易被抽中。
    weight: 16
    # 单次触发生成或处理的数量范围。
    amount: [1, 2]
    # 刷出实体时附加的药水效果列表。
    effects:
      # 列表项：轻微移速，让满月夜更紧张但不过度压迫。
      - SPEED:0:180
    # 刷出实体附加的 scoreboard tag 列表。
    tags:
      # 列表项：满月生态追踪标签。
      - moonlife_fullmoon
      # 列表项：原版轻生态标签。
      - vanilla_light_ecology
    # 规则优先级，数值越高越先匹配。
    priority: 30

  # 新月夜蛛：新月午夜会刷新少量蜘蛛，强化黑夜探索感。
  newmoon_night_spider:
    # 规则唯一 ID。
    id: newmoon_night_spider
    # 玩家可见的怪物规则中文名，不影响内部规则 ID。
    display-name: "新月夜蛛"
    # 是否启用该规则或相位文件。
    enable: true
    # 刷怪后端，轻生态默认使用原版实体。
    spawn-backend: VANILLA
    # 原版实体类型。
    vanilla-entity: SPIDER
    # 规则生效的世界列表，留空表示不限制。
    worlds: [world]
    # 规则生效的群系列表，留空表示不限制。
    biomes: []
    # 规则直接绑定的月相列表，通常建议在 moon-phases 目录中配置。
    moon-phases: []
    # 规则直接绑定的日相列表，通常建议在 solar-phases 目录中配置。
    solar-phases: []
    # 规则生效的天气列表。
    weather: [CLEAR, RAIN, THUNDER]
    # 允许刷怪或生效的 Y 坐标范围。
    y-range: [-32, 110]
    # 允许刷怪或生效的光照范围。
    light-range: [0, 8]
    # 地形条件，支持 SURFACE、UNDERGROUND、ANY。
    terrain: SURFACE
    # 是否只在荒野区域生效。
    wilderness-only: true
    # 附近玩家数量上限。
    nearby-player-limit: 5
    # 统计附近玩家数量的半径。
    nearby-player-radius: 44.0
    # 单区块生态实体数量上限。
    chunk-limit: 3
    # 单世界生态实体数量上限。
    world-limit: 48
    # 规则冷却时间，单位为 tick。
    cooldown: 640
    # 权重，数值越高越容易被抽中。
    weight: 12
    # 单次触发生成或处理的数量范围。
    amount: [1, 1]
    # 刷出实体时附加的药水效果列表。
    effects: []
    # 刷出实体附加的 scoreboard tag 列表。
    tags:
      # 列表项：新月生态追踪标签。
      - moonlife_newmoon
      # 列表项：原版轻生态标签。
      - vanilla_light_ecology
    # 规则优先级，数值越高越先匹配。
    priority: 40

  # 雷雨骷髅巡游：雷雨夜晚出现少量骷髅，提高风险但不改变原版体验。
  thunder_skeleton_patrol:
    # 规则唯一 ID。
    id: thunder_skeleton_patrol
    # 玩家可见的怪物规则中文名，不影响内部规则 ID。
    display-name: "雷雨骷髅巡游"
    # 是否启用该规则或相位文件。
    enable: true
    # 刷怪后端，轻生态默认使用原版实体。
    spawn-backend: VANILLA
    # 原版实体类型。
    vanilla-entity: SKELETON
    # 规则生效的世界列表，留空表示不限制。
    worlds: [world]
    # 规则生效的群系列表，留空表示不限制。
    biomes: []
    # 规则直接绑定的月相列表，通常建议在 moon-phases 目录中配置。
    moon-phases: []
    # 规则直接绑定的日相列表，通常建议在 solar-phases 目录中配置。
    solar-phases: []
    # 规则生效的天气列表。
    weather: [THUNDER]
    # 允许刷怪或生效的 Y 坐标范围。
    y-range: [-32, 120]
    # 允许刷怪或生效的光照范围。
    light-range: [0, 8]
    # 地形条件，支持 SURFACE、UNDERGROUND、ANY。
    terrain: SURFACE
    # 是否只在荒野区域生效。
    wilderness-only: true
    # 附近玩家数量上限。
    nearby-player-limit: 7
    # 统计附近玩家数量的半径。
    nearby-player-radius: 48.0
    # 单区块生态实体数量上限。
    chunk-limit: 4
    # 单世界生态实体数量上限。
    world-limit: 72
    # 规则冷却时间，单位为 tick。
    cooldown: 420
    # 权重，数值越高越容易被抽中。
    weight: 18
    # 单次触发生成或处理的数量范围。
    amount: [1, 2]
    # 刷出实体时附加的药水效果列表。
    effects: []
    # 刷出实体附加的 scoreboard tag 列表。
    tags:
      # 列表项：雷雨生态追踪标签。
      - moonlife_thunder
      # 列表项：原版轻生态标签。
      - vanilla_light_ecology
    # 规则优先级，数值越高越先匹配。
    priority: 20

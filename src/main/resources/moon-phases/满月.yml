# 满月：精英怪、祭坛和下界作物强化。
enable: true
# 显示名称。
display-name: "满月"
# 该月相或日相启用的功能 ID 根节点。
functions:
  # 该相位启用的怪物规则 ID 列表。
  monsters:
    # 列表项：该列表中的一个配置值。
    - fullmoon_zombie_knight
  # 祭坛配置根节点。
  altars:
    # 列表项：该列表中的一个配置值。
    - fullmoon_altar
  # 该相位启用的作物规则 ID 列表。
  crops:
    # 列表项：该列表中的一个配置值。
    - fullmoon_nether_wart
  # 该相位启用的玩家状态规则 ID 列表。
  buffs: []
  # 生态热点配置根节点。
  hotspots: []

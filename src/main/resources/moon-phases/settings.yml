# 月相系统通用设置。
worlds:
  # 是否启用该功能或规则。
  enabled: []
  # 配置项 disabled 的值，请根据实际玩法需求调整。
  disabled: []

# 配置项 events 的值，请根据实际玩法需求调整。
events:
  # 是否广播月相变化，轻生态默认交给白昼/夜晚摘要统一提示。
  broadcast: false
  # 是否使用 ActionBar 提示月相变化，轻生态默认交给日相 ActionBar 统一提示。
  actionbar: false
  # 是否使用 BossBar 提示相位变化。
  bossbar: false
  # 是否使用 Title 提示相位变化。
  title: false
  # 是否只在月亮可见时向玩家提示月相变化，避免白天出现月相提示。
  visible-only: true

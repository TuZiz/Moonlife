# 残月：适合潜行、绕路和安静采集。
enable: true
# 显示名称。
display-name: "残月"
# 该月相或日相启用的功能 ID 根节点。
functions:
  # 该相位启用的怪物规则 ID 列表。
  monsters: []
  # 祭坛配置根节点。
  altars: []
  # 该相位启用的作物规则 ID 列表。
  crops: []
  # 该相位启用的玩家状态规则 ID 列表。
  buffs:
    # 列表项：该列表中的一个配置值。
    - waning_crescent_sneak
  # 生态热点配置根节点。
  hotspots:
    # 列表项：该列表中的一个配置值。
    - river_mist
# 该月相切换时的提示文本配置。
messages:
  # 月相变化广播提示。
  broadcast: '<prefix><#CBD5E1>月相更替 ✦ <world> 的夜空进入 <#FFFFFF><phase></#FFFFFF>。'
  # 月相变化 ActionBar 提示。
  actionbar: '<#CBD5E1>☾ 当前月相：<#FFFFFF><phase></#FFFFFF>'
  # 月相变化 Title 主标题。
  title: '<#CBD5E1>☾ <phase>'
  # 月相变化 Title 副标题。
  subtitle: '<#F8FAFC>潜行探索和安静采集获得轻微收益'
  # 月相变化 BossBar 提示。
  bossbar: '<#CBD5E1>月相 ☾ <#FFFFFF><phase></#FFFFFF>'

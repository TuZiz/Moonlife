# 残月：偏向潜行、残夜探索和夜系材料。
enable: true
# 显示名称。
display-name: "残月"
# 该月相启用的功能 ID 根节点。
functions:
  # 残月启用的怪物规则。
  monsters: []
  # 残月启用的小型祭坛。
  altars:
    # 影尘灯盏用于夜视辅助。
    - shadow_lantern
  # 残月启用的作物规则。
  crops: []
  # 残月启用的玩家状态规则。
  buffs:
    # 潜行时轻微收益。
    - waning_crescent_sneak
  # 残月启用的生态热点。
  hotspots:
    # 暗沼边缘适合夜间暗处采集。
    - dark_swamp_edge
  # 残月启用的材料掉落规则。
  material-drops:
    # 暗林与沼泽夜间采集小概率获得影尘。
    - dark_forest_shadow_gather
# 该月相切换时的提示文本配置。
messages:
  # 月相变化广播提示。
  broadcast: '<prefix><#CBD5E1>残月低悬 ✦ 潜行和残夜采集变得更安静。'
  # 月相变化 ActionBar 提示。
  actionbar: '<#CBD5E1>残月</#CBD5E1> <#94A3B8>·</#94A3B8> <#F8FAFC>潜行 / 暗处采集</#F8FAFC>'
  # 月相变化 Title 主标题。
  title: '<#CBD5E1>☾ <phase>'
  # 月相变化 Title 副标题。
  subtitle: '<#F8FAFC>潜行探索和夜系材料略有收益'
  # 月相变化 BossBar 提示。
  bossbar: '<#CBD5E1>残月 ☾ <#FFFFFF><phase></#FFFFFF>'
  # 附加功能提示，默认不额外广播，避免刷屏。
  features: []

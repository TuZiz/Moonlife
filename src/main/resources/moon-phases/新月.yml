# 新月：偏向夜间潜行、暗处采集和沼泽黑森林探索。
enable: true
# 显示名称。
display-name: "新月"
# 该月相启用的功能 ID 根节点。
functions:
  # 新月启用的怪物规则。
  monsters:
    # 午夜和夜晚少量新月夜蛛。
    - newmoon_night_spider
  # 新月启用的小型祭坛。
  altars:
    # 影尘灯盏用于夜视辅助。
    - shadow_lantern
  # 新月启用的作物规则。
  crops: []
  # 新月启用的玩家状态规则。
  buffs: []
  # 新月启用的生态热点。
  hotspots:
    # 暗沼边缘适合夜间暗处采集。
    - dark_swamp_edge
  # 新月启用的材料掉落规则。
  material-drops:
    # 新月夜蛛小概率掉落影尘。
    - newmoon_spider_shadow_dust
    # 暗林与沼泽夜间采集小概率获得影尘。
    - dark_forest_shadow_gather
# 该月相切换时的提示文本配置。
messages:
  # 月相变化广播提示。
  broadcast: '<prefix><#9CA3AF>新月升起 ✦ 夜色更深，沼泽与黑森林的暗处采集略有变化。'
  # 月相变化 ActionBar 提示。
  actionbar: '<#9CA3AF>新月</#9CA3AF> <#94A3B8>·</#94A3B8> <#CBD5E1>暗处采集与夜蛛影尘</#CBD5E1>'
  # 月相变化 Title 主标题。
  title: '<#9CA3AF>☾ <phase>'
  # 月相变化 Title 副标题。
  subtitle: '<#CBD5E1>夜行、潜行和暗色采集更有价值'
  # 月相变化 BossBar 提示。
  bossbar: '<#9CA3AF>新月 ☾ <#FFFFFF><phase></#FFFFFF>'
  # 附加功能提示，默认不额外广播，避免刷屏。
  features: []

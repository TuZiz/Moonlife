# 盈凸月：偏向农业、农田照料和轻养殖收益。
enable: true
# 显示名称。
display-name: "盈凸月"
# 该月相启用的功能 ID 根节点。
functions:
  # 盈凸月启用的怪物规则。
  monsters: []
  # 盈凸月启用的小型祭坛。
  altars:
    # 月露堆肥台作为农业材料轻用途。
    - moonlit_composter
  # 盈凸月启用的作物规则。
  crops:
    # 盈凸月农田轻微成长偏好。
    - waxing_gibbous_field_care
  # 盈凸月启用的玩家状态规则。
  buffs:
    # 农业和养殖相关经验略微提高。
    - waxing_gibbous_field_hand
  # 盈凸月启用的生态热点。
  hotspots:
    # 林地小径保持轻探索价值。
    - forest_trail
  # 盈凸月启用的材料掉落规则。
  material-drops:
    # 成熟作物小概率产出月露种子。
    - moonlit_harvest_seed
# 该月相切换时的提示文本配置。
messages:
  # 月相变化广播提示。
  broadcast: '<prefix><#C4B5FD>盈凸月升起 ✦ 农田、瓜藤和日常照料略微受益。'
  # 月相变化 ActionBar 提示。
  actionbar: '<#C4B5FD>盈凸月</#C4B5FD> <#94A3B8>·</#94A3B8> <#EDE9FE>农业与月露种子</#EDE9FE>'
  # 月相变化 Title 主标题。
  title: '<#C4B5FD>☾ <phase>'
  # 月相变化 Title 副标题。
  subtitle: '<#EDE9FE>成熟作物有小概率凝出月露种子'
  # 月相变化 BossBar 提示。
  bossbar: '<#C4B5FD>盈凸月 ☾ <#FFFFFF><phase></#FFFFFF>'
  # 附加功能提示，默认不额外广播，避免刷屏。
  features: []

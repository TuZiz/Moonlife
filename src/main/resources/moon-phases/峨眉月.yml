# 峨眉月：偏向林地采集、跑图和轻旅行收益。
enable: true
# 显示名称。
display-name: "峨眉月"
# 该月相启用的功能 ID 根节点。
functions:
  # 峨眉月启用的怪物规则。
  monsters: []
  # 峨眉月启用的小型祭坛。
  altars: []
  # 峨眉月启用的作物规则。
  crops: []
  # 峨眉月启用的玩家状态规则。
  buffs:
    # 野外移动和探索轻微收益。
    - waxing_crescent_pathfinder
  # 峨眉月启用的生态热点。
  hotspots:
    # 林地小径适合跑图和采集。
    - forest_trail
  # 峨眉月启用的材料掉落规则。
  material-drops: []
# 该月相切换时的提示文本配置。
messages:
  # 月相变化广播提示。
  broadcast: '<prefix><#A5B4FC>峨眉月临空 ✦ 林地和旅途变得更适合轻探索。'
  # 月相变化 ActionBar 提示。
  actionbar: '<#A5B4FC>峨眉月</#A5B4FC> <#94A3B8>·</#94A3B8> <#E0E7FF>林地采集与跑图收益</#E0E7FF>'
  # 月相变化 Title 主标题。
  title: '<#A5B4FC>☾ <phase>'
  # 月相变化 Title 副标题。
  subtitle: '<#E0E7FF>野外移动和林地探索略微顺手'
  # 月相变化 BossBar 提示。
  bossbar: '<#A5B4FC>峨眉月 ☾ <#FFFFFF><phase></#FFFFFF>'
  # 附加功能提示，默认不额外广播，避免刷屏。
  features: []

# 消息前缀，所有用户可见文本通过 <prefix> 引用。
prefix: '<#7DD3FC>月<#F9A8D4>息 <#94A3B8>» '

# 命令消息根节点。
command:
  # 权限不足提示。
  no-permission: '<prefix><#FCA5A5>权限不足，无法执行这个操作。'
  # 仅玩家可执行提示。
  player-only: '<prefix><#FCA5A5>这个命令只能由玩家执行。'
  # 未知子命令提示。
  unknown: '<prefix><#FCA5A5>未知子命令，请使用 <#FFFFFF>/ecology</#FFFFFF> 查看帮助。'
  # 无可用世界提示。
  no-world: '<prefix><#FCA5A5>当前没有可用世界。'
  # 世界不存在提示。
  world-not-found: '<prefix><#FCA5A5>找不到世界 <#FFFFFF><world></#FFFFFF>。'
  # 重载命令消息根节点。
  reload:
    # 重载成功提示。
    success: '<prefix><#86EFAC>配置已重新加载，新的轻生态规则已生效。'
    # 重载失败提示。
    failed: '<prefix><#FCA5A5>配置重载失败，已保留旧规则，请查看控制台错误。'
  # 调试命令消息根节点。
  debug:
    # 调试摘要提示。
    summary: '<prefix><#E0F2FE>当前已加载 <#FFFFFF><spawn_rules></#FFFFFF> 条刷怪规则、<#FFFFFF><crop_rules></#FFFFFF> 条作物规则、<#FFFFFF><buff_rules></#FFFFFF> 条状态规则。'
  # 设置月相命令消息根节点。
  setmoon:
    # 月相参数无效提示。
    invalid: '<prefix><#FCA5A5>无效月相。可用：新月、峨眉月、上弦月、盈凸月、满月、亏凸月、下弦月、残月。'
    # 月相设置成功提示。
    success: '<prefix><#C4B5FD>已将 <#FFFFFF><world></#FFFFFF> 的月相设置为 <#FFFFFF><phase></#FFFFFF>。'
  # 设置日相命令消息根节点。
  setsolar:
    # 日相参数无效提示。
    invalid: '<prefix><#FCA5A5>无效日相。可用：黎明、白昼、黄昏、夜晚、午夜。'
    # 日相设置成功提示。
    success: '<prefix><#FDBA74>已将 <#FFFFFF><world></#FFFFFF> 的日相设置为 <#FFFFFF><phase></#FFFFFF>。'
  # 月相查询命令消息根节点。
  lunarphase:
    # 月相查询结果。
    info: '<prefix><#E0F2FE><#FFFFFF><world></#FFFFFF> 当前月相：<#FFFFFF><phase></#FFFFFF>。'
  # 日相查询命令消息根节点。
  solarphase:
    # 日相查询结果。
    info: '<prefix><#E0F2FE><#FFFFFF><world></#FFFFFF> 当前日相：<#FFFFFF><phase></#FFFFFF>。'
  # 生态信息命令消息根节点。
  info:
    # 当前生态摘要。
    summary: '<prefix><#E0F2FE><#FFFFFF><world></#FFFFFF>：月相 <#FFFFFF><moon></#FFFFFF>，日相 <#FFFFFF><solar></#FFFFFF>，天气 <#FFFFFF><weather></#FFFFFF>。'
  # 预览命令消息根节点。
  preview:
    # 预览命中规则数量。
    header: '<prefix><#BAE6FD>当前位置命中 <#FFFFFF><count></#FFFFFF> 条潜在刷怪规则：'
    # 预览命中规则条目。
    entry: '<#94A3B8>  - <#FFFFFF><id> <#94A3B8>| <#CBD5E1>目标: <target> <#94A3B8>| <#CBD5E1>权重: <#FFFFFF><weight>'
  # 测试刷怪命令消息根节点。
  testspawn:
    # 测试刷怪已提交提示。
    queued: '<prefix><#86EFAC>已提交一次附近刷怪测试。'
  # 测试增益命令消息根节点。
  testbuff:
    # 测试增益摘要。
    summary: '<prefix><#86EFAC>当前可应用状态：<#FFFFFF><rules></#FFFFFF>。'
  # 帮助菜单消息列表。
  help:
    # 帮助菜单：查看生态状态。
    - '<prefix><#E0F2FE>/ecology info <#94A3B8>- 查看当前月相、日相和天气'
    # 帮助菜单：预览刷怪规则。
    - '<prefix><#E0F2FE>/ecology preview <#94A3B8>- 预览当前位置刷怪规则'
    # 帮助菜单：重载配置。
    - '<prefix><#E0F2FE>/ecology reload <#94A3B8>- 校验并热重载配置'
    # 帮助菜单：调试状态。
    - '<prefix><#E0F2FE>/ecology debug <#94A3B8>- 查看规则缓存数量'
    # 帮助菜单：设置月相。
    - '<prefix><#E0F2FE>/ecology setmoon <phase> [world] <#94A3B8>- 手动设置月相'
    # 帮助菜单：设置日相。
    - '<prefix><#E0F2FE>/ecology setsolar <phase> [world] <#94A3B8>- 手动设置日相'
    # 帮助菜单：测试刷怪。
    - '<prefix><#E0F2FE>/ecology testspawn <#94A3B8>- 执行一次附近刷怪测试'
    # 帮助菜单：测试增益。
    - '<prefix><#E0F2FE>/ecology testbuff <#94A3B8>- 测试当前状态规则'
    # 帮助菜单：事件日历。
    - '<prefix><#E0F2FE>/ecology calendar [world] <#94A3B8>- 查看未来月相和功能摘要'
    # 帮助菜单：规则命中解释。
    - '<prefix><#E0F2FE>/ecology inspect <#94A3B8>- 解释当前位置命中的生态内容'
    # 帮助菜单：配置校验。
    - '<prefix><#E0F2FE>/ecology validate <#94A3B8>- 检查默认配置和软依赖状态'
    # 帮助菜单：调试显示。
    - '<prefix><#E0F2FE>/ecology bossbar <#94A3B8>- 开关生态危险等级 BossBar'
    # 帮助菜单：临时事件。
    - '<prefix><#E0F2FE>/ecology event start <id> [minutes] [multiplier] <#94A3B8>- 启动可选临时事件'
    # 帮助菜单：悬赏。
    - '<prefix><#E0F2FE>/ecology bounty <#94A3B8>- 查看可选悬赏扩展'
    # 帮助菜单：图鉴。
    - '<prefix><#E0F2FE>/ecology codex <#94A3B8>- 查看可选图鉴扩展'
    # 帮助菜单：生态材料。
    - '<prefix><#E0F2FE>/ecology materials <#94A3B8>- 查看生态材料来源和用途'
    # 帮助菜单：世界模板。
    - '<prefix><#E0F2FE>/ecology template [name] <#94A3B8>- 查看世界配置建议'
    # 帮助菜单：规则统计。
    - '<prefix><#E0F2FE>/ecology stats <#94A3B8>- 查看规则触发统计'

# 月相消息根节点。
moon:
  # 月相变化消息根节点。
  changed:
    # 月相变化广播。
    broadcast: '<prefix><#C4B5FD>月相变化：<#FFFFFF><world></#FFFFFF> 进入 <#FFFFFF><phase></#FFFFFF>。'
    # 月相变化 ActionBar。
    actionbar: '<#C4B5FD>月相：<#FFFFFF><phase></#FFFFFF>'
    # 月相变化 Title 主标题。
    title: '<#C4B5FD><phase>'
    # 月相变化 Title 副标题。
    subtitle: '<#E0E7FF>世界生态略有变化'
    # 月相变化 BossBar。
    bossbar: '<#C4B5FD>月相 <#FFFFFF><phase></#FFFFFF>'

# 日相消息根节点。
solar:
  # 日相变化消息根节点。
  changed:
    # 日相变化广播。
    broadcast: '<prefix><#FDBA74>日相变化：<#FFFFFF><world></#FFFFFF> 进入 <#FFFFFF><phase></#FFFFFF>。'
    # 日相变化 ActionBar。
    actionbar: '<#FDBA74>日相：<#FFFFFF><phase></#FFFFFF>'
    # 日相变化 Title 主标题。
    title: '<#FDBA74><phase>'
    # 日相变化 Title 副标题。
    subtitle: '<#FFEDD5>当下行为偏好略有变化'
    # 日相变化 BossBar。
    bossbar: '<#FDBA74>日相 <#FFFFFF><phase></#FFFFFF>'

# 玩家增益消息根节点。
buff:
  # 玩家增益变化消息根节点。
  changed:
    # 玩家增益变化 ActionBar。
    actionbar: '<#A7F3D0>生态状态：<#FFFFFF><rules></#FFFFFF>'
  # 玩家增益测试消息根节点。
  test:
    # 玩家增益测试应用提示。
    applied: '<prefix><#86EFAC>已应用测试状态：<#FFFFFF><rules></#FFFFFF>。'

# 刷怪消息根节点。
spawn:
  # 刷怪调试消息根节点。
  debug:
    # 性能保护跳过提示。
    skipped-performance: '<prefix><#FDE68A>当前 TPS/MSPT 不适合执行生态刷新，本轮已跳过。'
    # 刷怪成功调试提示。
    spawned: '<prefix><#BAE6FD>规则 <#FFFFFF><rule></#FFFFFF> 已刷新目标 <#FFFFFF><target></#FFFFFF>。'

# 扩展功能消息根节点。
feature:
  # 通用功能输出行。
  line: '<prefix><#E0F2FE><line>'
  # 月相祭坛消息根节点。
  altar:
    # 祭坛触发成功。
    activated: '<prefix><#86EFAC><#FFFFFF><altar></#FFFFFF> 已触发：<#FFFFFF><event></#FFFFFF>。'
    # 祭坛材料不足。
    insufficient: '<prefix><#FDE68A><#FFFFFF><altar></#FFFFFF> 需要至少 <#FFFFFF><amount></#FFFFFF> 个匹配材料。'
  # 悬赏消息根节点。
  bounty:
    # 悬赏完成提示。
    completed: '<prefix><#86EFAC>已完成可选悬赏：<#FFFFFF><bounty></#FFFFFF>。'
  # 成就消息根节点。
  achievement:
    # 成就完成提示。
    completed: '<prefix><#F9A8D4>已完成可选图鉴目标：<#FFFFFF><achievement></#FFFFFF>，展示名：<#FFFFFF><title></#FFFFFF>。'
  # 调试 BossBar / ActionBar 消息根节点。
  debug-bossbar:
    # 开启调试显示。
    enabled: '<prefix><#86EFAC>生态危险 BossBar 已开启。'
    # 关闭调试显示。
    disabled: '<prefix><#FDE68A>生态危险 BossBar 已关闭。'
    # 调试显示内容。
    line: '<#7DD3FC>危险 <#FFFFFF><danger></#FFFFFF> <#94A3B8>(<score>)</#94A3B8> <#94A3B8>| <#F9A8D4>事件 <#FFFFFF><event></#FFFFFF> <#94A3B8>| <#86EFAC>热点 <#FFFFFF><hotspot></#FFFFFF>'
  # 临时事件消息根节点。
  event:
    # 未知事件提示。
    unknown: '<prefix><#FCA5A5>未知临时事件：<#FFFFFF><event></#FFFFFF>。'
    # 事件启动提示。
    started: '<prefix><#86EFAC>临时生态事件 <#FFFFFF><event></#FFFFFF> 已启动，剩余 <#FFFFFF><seconds></#FFFFFF> 秒。'

# 月相显示名根节点。
moon-phase:
  # 新月显示名。
  new_moon: '<#9CA3AF>新月'
  # 峨眉月显示名。
  waxing_crescent: '<#A5B4FC>峨眉月'
  # 上弦月显示名。
  first_quarter: '<#BFDBFE>上弦月'
  # 盈凸月显示名。
  waxing_gibbous: '<#C4B5FD>盈凸月'
  # 满月显示名。
  full_moon: '<#F9A8D4>满月'
  # 亏凸月显示名。
  waning_gibbous: '<#DDD6FE>亏凸月'
  # 下弦月显示名。
  last_quarter: '<#93C5FD>下弦月'
  # 残月显示名。
  waning_crescent: '<#CBD5E1>残月'

# 日相显示名根节点。
solar-phase:
  # 黎明显示名。
  dawn: '<#FDBA74>黎明'
  # 白昼显示名。
  day: '<#86EFAC>白昼'
  # 黄昏显示名。
  dusk: '<#F0ABFC>黄昏'
  # 夜晚显示名。
  night: '<#93C5FD>夜晚'
  # 午夜显示名。
  midnight: '<#C4B5FD>午夜'

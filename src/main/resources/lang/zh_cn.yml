# 消息前缀，所有用户可见消息通过 <prefix> 引用。
prefix: '<#7DD3FC>月<#F9A8D4>息 <#94A3B8>» '

# 命令消息根节点。
command:
  # 权限不足提示。
  no-permission: '<prefix><#FCA5A5>星界抗拒 ✦ 你尚未掌握触碰此等法则的奥秘。'
  # 仅玩家可执行提示。
  player-only: '<prefix><#FCA5A5>时空排斥 ✦ 仅有拥有实体的降生者可引动此律法。'
  # 未知子命令提示。
  unknown: '<prefix><#FCA5A5>星象迷乱 ✦ 未知的指令轨迹，请查阅星象图。'
  # 无可用世界提示。
  no-world: '<prefix><#FCA5A5>虚无之境 ✦ 当前维度无法观测到任何生息流转。'
  # 世界不存在提示。
  world-not-found: '<prefix><#FCA5A5>迷失星图 ✦ 无法在万界中感知到 <#FFFFFF><world></#FFFFFF> 的存在。'
  # 重载命令消息根节点。
  reload:
    # 重载成功提示。
    success: '<prefix><#86EFAC>万物律动 ✦ 生态法则已重新编织，新的秩序已然降临。'
    # 重载失败提示。
    failed: '<prefix><#FCA5A5>时空乱流 ✦ 法则重塑失败，已回溯至旧有秩序，请查阅星界枢纽（控制台）以寻根源。'
  # 调试命令消息根节点。
  debug:
    # 调试摘要提示。
    summary: '<prefix><#E0F2FE>全视之眼 ✦ 当前流转 <#FFFFFF><spawn_rules></#FFFFFF> 道降生法则，<#FFFFFF><crop_rules></#FFFFFF> 种草木枯荣，<#FFFFFF><buff_rules></#FFFFFF> 层星辉赐福。'
  # 设置月相命令消息根节点。
  setmoon:
    # 月相参数无效提示。
    invalid: '<prefix><#FCA5A5>刻度偏移 ✦ 无效的月相坐标。可用星轨：新月、峨眉月、上弦月、盈凸月、满月、亏凸月、下弦月、残月。'
    # 月相设置成功提示。
    success: '<prefix><#C4B5FD>神明干涉 ✦ <#FFFFFF><world></#FFFFFF> 的夜幕已被强行改写，月相定格于：<#FFFFFF><phase></#FFFFFF>。'
  # 设置日相命令消息根节点。
  setsolar:
    # 日相参数无效提示。
    invalid: '<prefix><#FCA5A5>刻度偏移 ✦ 无效的日相坐标。可用天轨：黎明、白昼、黄昏、夜晚、午夜。'
    # 日相设置成功提示。
    success: '<prefix><#FDBA74>神明干涉 ✦ <#FFFFFF><world></#FFFFFF> 的天轨已被强行拨动，日相定格于：<#FFFFFF><phase></#FFFFFF>。'
  # 月相查询命令消息根节点。
  lunarphase:
    # 月相查询结果。
    info: '<prefix><#E0F2FE>星象观测 ✦ <#FFFFFF><world></#FFFFFF> 正处于 <#FFFFFF><phase></#FFFFFF> 的辉光之下。'
  # 日相查询命令消息根节点。
  solarphase:
    # 日相查询结果。
    info: '<prefix><#E0F2FE>天轨观测 ✦ <#FFFFFF><world></#FFFFFF> 的天光正值 <#FFFFFF><phase></#FFFFFF>。'
  # 生态信息命令消息根节点。
  info:
    # 当前生态摘要。
    summary: '<prefix><#E0F2FE>生态流转 ✦ <#FFFFFF><world></#FFFFFF> 天际悬挂 <#FFFFFF><moon></#FFFFFF>，天光正值 <#FFFFFF><solar></#FFFFFF>，气象演化为 <#FFFFFF><weather></#FFFFFF>。'
  # 预览命令消息根节点。
  preview:
    # 预览命中规则数量。
    header: '<prefix><#BAE6FD>灵能潮汐 ✦ 此处地脉交汇了 <#FFFFFF><count></#FFFFFF> 道潜在的生息法则：'
    # 预览命中规则条目。
    entry: '<#94A3B8>  ✧ <#FFFFFF><id> <#94A3B8>| <#CBD5E1>怪物名: <target> <#94A3B8>| <#CBD5E1>权重: <#FFFFFF><weight>'
  # 测试刷怪命令消息根节点。
  testspawn:
    # 测试刷怪已提交提示。
    queued: '<prefix><#86EFAC>魔力涌动 ✦ 已在四周注入纯粹魔力，强制唤醒一次生态降生。'
  # 测试增益命令消息根节点。
  testbuff:
    # 测试增益摘要。
    summary: '<prefix><#86EFAC>灵光天降 ✦ 试炼赐福已结算完毕，你与以下法则产生共鸣：<#FFFFFF><rules></#FFFFFF>。'
  # 帮助菜单消息列表。
  help:
    # 帮助菜单：查看生态状态。
    - '<prefix><#E0F2FE>/ecology info <#94A3B8>✧ 观测当前的生态流转状态'
    # 帮助菜单：预览刷怪规则。
    - '<prefix><#E0F2FE>/ecology preview <#94A3B8>✧ 洞悉当前区域的潜在法则'
    # 帮助菜单：重载配置。
    - '<prefix><#E0F2FE>/ecology reload <#94A3B8>✧ 重新编织并热重载世界秩序'
    # 帮助菜单：调试状态。
    - '<prefix><#E0F2FE>/ecology debug <#94A3B8>✧ 窥视底层法则与生息缓存'
    # 帮助菜单：设置月相。
    - '<prefix><#E0F2FE>/ecology setmoon <phase> [world] <#94A3B8>✧ 强行干涉并覆盖世界月相'
    # 帮助菜单：设置日相。
    - '<prefix><#E0F2FE>/ecology setsolar <phase> [world] <#94A3B8>✧ 强行干涉并拨动世界日相'
    # 帮助菜单：测试刷怪。
    - '<prefix><#E0F2FE>/ecology testspawn <#94A3B8>✧ 强行唤醒一次实地降生测试'
    # 帮助菜单：测试增益。
    - '<prefix><#E0F2FE>/ecology testbuff <#94A3B8>✧ 强行进行一次赐福状态结算'
    # 帮助菜单：事件日历。
    - '<prefix><#E0F2FE>/ecology calendar [world] <#94A3B8>✧ 翻阅未来的星象事件日历'
    # 帮助菜单：规则命中解释。
    - '<prefix><#E0F2FE>/ecology inspect <#94A3B8>✧ 解析当前坐标共鸣的生态规则'
    # 帮助菜单：配置校验。
    - '<prefix><#E0F2FE>/ecology validate <#94A3B8>✧ 勘测神话生物与生态卷轴的契合度'
    # 帮助菜单：调试显示。
    - '<prefix><#E0F2FE>/ecology bossbar <#94A3B8>✧ 开关生态危险等级的幻象显示'
    # 帮助菜单：临时事件。
    - '<prefix><#E0F2FE>/ecology event start <id> [minutes] [multiplier] <#94A3B8>✧ 强行开启临时生态纪元'
    # 帮助菜单：悬赏。
    - '<prefix><#E0F2FE>/ecology bounty <#94A3B8>✧ 揭榜当前的月相悬赏令'
    # 帮助菜单：图鉴。
    - '<prefix><#E0F2FE>/ecology codex <#94A3B8>✧ 阅览已解锁的万物生息图鉴'
    # 帮助菜单：生态材料。
    - '<prefix><#E0F2FE>/ecology materials <#94A3B8>✧ 追溯生态奇物的诞生源头'
    # 帮助菜单：世界模板。
    - '<prefix><#E0F2FE>/ecology template [name] <#94A3B8>✧ 查阅世界环境的刻印模板'
    # 帮助菜单：规则统计。
    - '<prefix><#E0F2FE>/ecology stats <#94A3B8>✧ 查看世界法则触发的源流统计'

# 月相消息根节点。
moon:
  # 月相变化消息根节点。
  changed:
    # 月相变化广播。
    broadcast: '<prefix><#C4B5FD>星海轮转 ✦ <world> 的月相已演化为 <#FFFFFF><phase></#FFFFFF>，阴影中的生息正悄然涌动...'
    # 月相变化 ActionBar。
    actionbar: '<#C4B5FD>☾ 穹顶皓月：<#FFFFFF><phase></#FFFFFF>'
    # 月相变化 Title 主标题。
    title: '<#C4B5FD>☾ <phase>'
    # 月相变化 Title 副标题。
    subtitle: '<#E0E7FF>万物蛰伏 · 夜幕法则已然重塑'
    # 月相变化 BossBar。
    bossbar: '<#C4B5FD>星轨推移 ☾ <#FFFFFF><phase></#FFFFFF>'

# 日相消息根节点。
solar:
  # 日相变化消息根节点。
  changed:
    # 日相变化广播。
    broadcast: '<prefix><#FDBA74>日月更迭 ✦ <world> 的天幕已流转至 <#FFFFFF><phase></#FFFFFF>。'
    # 日相变化 ActionBar。
    actionbar: '<#FDBA74>☼ 天际流光：<#FFFFFF><phase></#FFFFFF>'
    # 日相变化 Title 主标题。
    title: '<#FDBA74>☼ <phase>'
    # 日相变化 Title 副标题。
    subtitle: '<#FFEDD5>晨昏交替 · 大地律动已然苏醒'
    # 日相变化 BossBar。
    bossbar: '<#FDBA74>天轨推移 ☼ <#FFFFFF><phase></#FFFFFF>'

# 玩家增益消息根节点。
buff:
  # 玩家增益变化消息根节点。
  changed:
    # 玩家增益变化 ActionBar。
    actionbar: '<#A7F3D0>✧ 星辉赐福：<#FFFFFF><rules></#FFFFFF>'
  # 玩家增益测试消息根节点。
  test:
    # 玩家增益测试应用提示。
    applied: '<prefix><#86EFAC>灵光天降 ✦ 已向你降下测试赐福：<#FFFFFF><rules></#FFFFFF>。'

# 刷怪消息根节点。
spawn:
  # 刷怪调试消息根节点。
  debug:
    # 性能保护跳过提示。
    skipped-performance: '<prefix><#FDE68A>魔力过载 ✦ 现世法则承载力逼近极限，本轮生态演化已暂时陷入沉寂。'
    # 刷怪成功调试提示。
    spawned: '<prefix><#BAE6FD>法则具现 ✦ 遵循法则 <#FFFFFF><rule></#FFFFFF>，<#FFFFFF><target></#FFFFFF> 已于世间凝聚。'

# 扩展功能消息根节点。
feature:
  # 通用功能输出行。
  line: '<prefix><#E0F2FE><line>'
  # 月相祭坛消息根节点。
  altar:
    # 祭坛触发成功。
    activated: '<prefix><#C4B5FD>古老的回响 ✦ <altar></#C4B5FD> 已唤醒 <#FFFFFF><event></#FFFFFF>。'
  # 悬赏消息根节点。
  bounty:
    # 悬赏完成提示。
    completed: '<prefix><#86EFAC>契约达成 ✦ 悬赏已被斩获：<#FFFFFF><bounty></#FFFFFF>。'
  # 调试 BossBar / ActionBar 消息根节点。
  debug-bossbar:
    # 开启调试显示。
    enabled: '<prefix><#86EFAC>破妄之眼 ✦ 生态全视幻象已开启。'
    # 关闭调试显示。
    disabled: '<prefix><#FDE68A>灵视褪去 ✦ 生态全视幻象已关闭。'
    # 调试显示内容。
    line: '<#7DD3FC>危厄 <#FFFFFF><danger></#FFFFFF> <#94A3B8>(<score>)</#94A3B8> <#94A3B8>| <#F9A8D4>异象 <#FFFFFF><event></#FFFFFF> <#94A3B8>| <#86EFAC>灵脉 <#FFFFFF><hotspot></#FFFFFF>'
  # 临时事件消息根节点。
  event:
    # 未知事件提示。
    unknown: '<prefix><#FCA5A5>时空涟漪 ✦ 试图唤醒未知的生态异象：<#FFFFFF><event></#FFFFFF>。'
    # 事件启动提示。
    started: '<prefix><#86EFAC>纪元开启 ✦ 生态异象 <#FFFFFF><event></#FFFFFF> 已降临，将持续 <#FFFFFF><seconds></#FFFFFF> 秒。'

# 月相显示名根节点。
moon-phase:
  # 新月显示名。
  new_moon: '<#6B7280>新月'
  # 娥眉月显示名。
  waxing_crescent: '<#A5B4FC>峨眉月'
  # 上弦月显示名。
  first_quarter: '<#BFDBFE>上弦月'
  # 盈凸月显示名。
  waxing_gibbous: '<#C4B5FD>盈凸月'
  # 满月显示名。
  full_moon: '<#F9A8D4>满月'
  # 亏凸月显示名。
  waning_gibbous: '<#DDD6FE>亏凸月'
  # 下弦月显示名。
  last_quarter: '<#93C5FD>下弦月'
  # 残月显示名。
  waning_crescent: '<#CBD5E1>残月'

# 日相显示名根节点。
solar-phase:
  # 黎明显示名。
  dawn: '<#FDBA74>黎明'
  # 白昼显示名。
  day: '<#86EFAC>白昼'
  # 黄昏显示名。
  dusk: '<#F0ABFC>黄昏'
  # 夜晚显示名。
  night: '<#93C5FD>夜晚'
  # 午夜显示名。
  midnight: '<#C4B5FD>午夜'

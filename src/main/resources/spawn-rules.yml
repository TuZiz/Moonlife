# 野外刷怪规则配置根节点，所有规则启动或重载时会缓存进内存。
rules:
  # 满月夜晚强化 MythicMobs 僵尸骑士规则。
  fullmoon_zombie_knight:
    # 规则唯一 id，用于日志、调试、实体追踪和冷却。
    id: fullmoon_zombie_knight
    # 是否启用该规则。
    enable: true
    # 刷新后端，本默认配置要求怪物完全由 MythicMobs 提供。
    spawn-backend: MYTHIC_MOB
    # 原版实体占位值，该规则不会使用。
    vanilla-entity: ZOMBIE
    # MythicMobs 内部怪物名，需在 MythicMobs 中定义。
    mythic-mob-id: FullMoonZombieKnight
    # 允许触发该规则的世界列表，留空表示任意世界。
    worlds:
      # 主世界示例。
      - world
    # 允许触发该规则的生物群系列表，留空表示任意群系。
    biomes: []
    # 允许触发该规则的月相列表，留空表示任意月相。
    moon-phases:
      # 满月。
      - FULL_MOON
    # 允许触发该规则的日相列表，留空表示任意日相。
    solar-phases:
      # 夜晚。
      - NIGHT
      # 午夜。
      - MIDNIGHT
    # 允许触发该规则的天气列表，留空表示任意天气。
    weather:
      # 晴天。
      - CLEAR
      # 雨天。
      - RAIN
      # 雷暴。
      - THUNDER
    # 允许刷新的 Y 轴范围，格式为 [最小值, 最大值]。
    y-range: [-32, 120]
    # 允许刷新的方块光照范围，格式为 [最小值, 最大值]。
    light-range: [0, 7]
    # 地形模式，可选 ANY、SURFACE、UNDERGROUND。
    terrain: SURFACE
    # 兼容旧配置的地表开关，terrain 存在时以 terrain 为准。
    surface: true
    # 兼容旧配置的地下开关，terrain 存在时以 terrain 为准。
    underground: false
    # 是否只允许在荒野区域刷新。
    wilderness-only: true
    # 附近玩家上限，超过该值则跳过该规则。
    nearby-player-limit: 6
    # 附近玩家统计半径。
    nearby-player-radius: 48.0
    # 单区块同类目标数量上限。
    chunk-limit: 4
    # 单世界该规则追踪实体数量上限。
    world-limit: 80
    # 规则冷却 tick，按世界隔离。
    cooldown: 500
    # 权重值，越高越容易被选中。
    weight: 18
    # 每次刷新数量范围。
    amount: [1, 3]
    # 刷新后给实体附加的药水效果列表，格式 EFFECT:AMPLIFIER:DURATION_TICKS。
    effects:
      # 可选兜底速度效果，主要技能建议在 MythicMobs 内定义。
      - SPEED:1:200
      # 可选兜底攻击提升效果，主要技能建议在 MythicMobs 内定义。
      - INCREASE_DAMAGE:0:200
    # 刷新后给实体添加的 scoreboard tag。
    tags:
      # 满月生态标记。
      - moonlife_fullmoon
      # 野外精英标记。
      - elite_wilderness
    # 规则优先级，高优先级先参与候选排序。
    priority: 30

  # 新月午夜刷新 MythicMobs 暗影兽规则。
  newmoon_shadow_beast:
    # 规则唯一 id，用于日志、调试、实体追踪和冷却。
    id: newmoon_shadow_beast
    # 是否启用该规则。
    enable: true
    # 刷新后端，MYTHIC_MOB 表示调用 MythicMobs。
    spawn-backend: MYTHIC_MOB
    # 原版实体占位值，该规则不会使用。
    vanilla-entity: ZOMBIE
    # MythicMobs 内部怪物名，需在 MythicMobs 中定义。
    mythic-mob-id: ShadowBeast
    # 允许触发该规则的世界列表，留空表示任意世界。
    worlds:
      # 主世界示例。
      - world
    # 允许触发该规则的生物群系列表。
    biomes:
      # 黑森林。
      - DARK_FOREST
      # 沼泽。
      - SWAMP
      # 红树林沼泽。
      - MANGROVE_SWAMP
    # 允许触发该规则的月相列表。
    moon-phases:
      # 新月。
      - NEW_MOON
    # 允许触发该规则的日相列表。
    solar-phases:
      # 午夜。
      - MIDNIGHT
    # 允许触发该规则的天气列表。
    weather:
      # 晴天。
      - CLEAR
      # 雨天。
      - RAIN
      # 雷暴。
      - THUNDER
    # 允许刷新的 Y 轴范围。
    y-range: [-32, 90]
    # 允许刷新的方块光照范围。
    light-range: [0, 4]
    # 地形模式，可选 ANY、SURFACE、UNDERGROUND。
    terrain: SURFACE
    # 是否只允许在荒野区域刷新。
    wilderness-only: true
    # 附近玩家上限，超过该值则跳过该规则。
    nearby-player-limit: 4
    # 附近玩家统计半径。
    nearby-player-radius: 56.0
    # 单区块同类目标数量上限。
    chunk-limit: 2
    # 单世界该规则追踪实体数量上限。
    world-limit: 24
    # 规则冷却 tick，按世界隔离。
    cooldown: 1200
    # 权重值，越高越容易被选中。
    weight: 8
    # 每次刷新数量范围。
    amount: [1, 1]
    # 刷新后给实体附加的药水效果列表。
    effects: []
    # 刷新后给实体添加的 scoreboard tag。
    tags:
      # 新月生态标记。
      - moonlife_newmoon
      # Mythic 暗影怪标记。
      - mythic_shadow
    # 规则优先级，高优先级先参与候选排序。
    priority: 50

  # 雷雨夜强化野外危险度的 MythicMobs 袭击者规则。
  thunder_night_raider:
    # 规则唯一 id，用于日志、调试、实体追踪和冷却。
    id: thunder_night_raider
    # 是否启用该规则。
    enable: true
    # 刷新后端，本默认配置要求怪物完全由 MythicMobs 提供。
    spawn-backend: MYTHIC_MOB
    # 原版实体占位值，该规则不会使用。
    vanilla-entity: SKELETON
    # MythicMobs 内部怪物名，需在 MythicMobs 中定义。
    mythic-mob-id: StormboneRaider
    # 允许触发该规则的世界列表。
    worlds:
      # 主世界示例。
      - world
    # 允许触发该规则的生物群系列表，留空表示任意群系。
    biomes: []
    # 允许触发该规则的月相列表，留空表示任意月相。
    moon-phases: []
    # 允许触发该规则的日相列表。
    solar-phases:
      # 夜晚。
      - NIGHT
      # 午夜。
      - MIDNIGHT
    # 允许触发该规则的天气列表。
    weather:
      # 雷暴。
      - THUNDER
    # 允许刷新的 Y 轴范围。
    y-range: [-32, 120]
    # 允许刷新的方块光照范围。
    light-range: [0, 8]
    # 地形模式，可选 ANY、SURFACE、UNDERGROUND。
    terrain: SURFACE
    # 是否只允许在荒野区域刷新。
    wilderness-only: true
    # 附近玩家上限，超过该值则跳过该规则。
    nearby-player-limit: 8
    # 附近玩家统计半径。
    nearby-player-radius: 64.0
    # 单区块同类目标数量上限。
    chunk-limit: 5
    # 单世界该规则追踪实体数量上限。
    world-limit: 96
    # 规则冷却 tick，按世界隔离。
    cooldown: 360
    # 权重值，越高越容易被选中。
    weight: 22
    # 每次刷新数量范围。
    amount: [1, 2]
    # 刷新后给实体附加的药水效果列表。
    effects:
      # 可选兜底速度效果，主要技能建议在 MythicMobs 内定义。
      - SPEED:0:160
    # 刷新后给实体添加的 scoreboard tag。
    tags:
      # 雷雨生态标记。
      - moonlife_thunder
    # 规则优先级，高优先级先参与候选排序。
    priority: 20

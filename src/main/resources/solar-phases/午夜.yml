# 午夜：服务少量高辨识度夜间事件，不额外刷屏。
enable: true
# 显示名称。
display-name: "午夜"
# 日相时间窗口配置根节点。
time:
  # 日相开始时间，使用 Minecraft 世界 tick。
  start: 18000
  # 日相结束时间，使用 Minecraft 世界 tick。
  end: 23000
# 该日相启用的功能 ID 根节点。
functions:
  # 午夜启用的怪物规则。
  monsters:
    # 新月午夜会出现少量夜蛛。
    - newmoon_night_spider
    # 满月午夜会继续出现僵尸群。
    - fullmoon_zombie_pack
    # 雷雨午夜会继续出现骷髅巡游。
    - thunder_skeleton_patrol
  # 午夜启用的小型祭坛。
  altars:
    # 新月和残月可使用影尘灯盏。
    - shadow_lantern
    # 雷雨午夜可使用雷骨避雷针。
    - stormbone_rod
  # 午夜启用的作物规则。
  crops: []
  # 午夜启用的玩家状态规则。
  buffs:
    # 雷雨午夜高风险轻收益。
    - thunder_night_risk
  # 午夜启用的生态热点。
  hotspots:
    # 暗沼边缘适合新月和残月午夜采集。
    - dark_swamp_edge
    # 风暴山脊适合雷雨午夜风险探索。
    - storm_ridge
  # 午夜启用的材料掉落规则。
  material-drops:
    # 新月夜蛛掉落影尘。
    - newmoon_spider_shadow_dust
    # 新月和残月暗处采集掉落影尘。
    - dark_forest_shadow_gather
    # 满月夜钓鱼掉落月露种子。
    - fullmoon_fishing_moonlit_seed
    # 雷雨骷髅掉落雷骨碎片。
    - thunder_skeleton_stormbone
# 该日相切换时的提示文本配置。
messages:
  # 是否公告该相位，午夜默认静默，避免夜间重复刷屏。
  announce: false
  # 日相变化广播提示。
  broadcast: '<prefix><#C4B5FD>午夜已至 ✦ 夜间生态进入最明显的时段。'
  # 日相变化 ActionBar 提示。
  actionbar: '<#C4B5FD>午夜</#C4B5FD> <#94A3B8>·</#94A3B8> <#EDE9FE>少量高辨识度夜间事件</#EDE9FE>'
  # 日相变化 Title 主标题。
  title: '<#C4B5FD>☼ <phase>'
  # 日相变化 Title 副标题。
  subtitle: '<#EDE9FE>新月、满月和雷雨事件更明显'
  # 日相变化 BossBar 提示。
  bossbar: '<#C4B5FD>午夜 ☼ <#FFFFFF><phase></#FFFFFF>'
  # 附加功能提示，默认不额外广播。
  features: []

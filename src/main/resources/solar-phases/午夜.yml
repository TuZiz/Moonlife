# 午夜：新月影兽、满月精英怪和雷雨夜危险都会在这里变得更活跃。
enable: true
# 显示名称。
display-name: "午夜"
# 日相时间窗口配置根节点。
time:
  # 日相开始时间，使用 Minecraft 世界 tick。
  start: 18000
  # 日相结束时间，使用 Minecraft 世界 tick。
  end: 23000
# 该月相或日相启用的功能 ID 根节点。
functions:
  # 该相位启用的怪物规则 ID 列表。
  monsters:
    # 列表项：该列表中的一个配置值。
    - newmoon_shadow_beast
    # 列表项：该列表中的一个配置值。
    - fullmoon_zombie_knight
    # 列表项：该列表中的一个配置值。
    - thunder_night_raider
  # 祭坛配置根节点。
  altars:
    # 列表项：该列表中的一个配置值。
    - fullmoon_altar
  # 该相位启用的作物规则 ID 列表。
  crops: []
  # 该相位启用的玩家状态规则 ID 列表。
  buffs:
    # 列表项：该列表中的一个配置值。
    - thunder_night_danger
  # 生态热点配置根节点。
  hotspots:
    # 列表项：该列表中的一个配置值。
    - newmoon_shadow_hotspot
    # 列表项：该列表中的一个配置值。
    - thunder_night_hotspot
# 该日相切换时的提示文本配置。
messages:
  # 日相变化广播提示。
  broadcast: '<prefix><#C4B5FD>午夜已至 ✦ <world> 的深夜生态达到峰值。'
  # 日相变化 ActionBar 提示。
  actionbar: '<#C4B5FD>☼ 当前日相：<#FFFFFF><phase></#FFFFFF>'
  # 日相变化 Title 主标题。
  title: '<#C4B5FD>☼ <phase>'
  # 日相变化 Title 副标题。
  subtitle: '<#EDE9FE>新月、满月与雷雨生态在午夜最活跃'
  # 日相变化 BossBar 提示。
  bossbar: '<#C4B5FD>午夜生态 ☼ <#FFFFFF><phase></#FFFFFF>'
  # 功能提示列表，仅当本文件 functions 中配置了功能时发送。
  features:
    # 午夜怪物提示。
    - '<prefix><#EDE9FE>午夜功能 ✦ 新月影兽、满月骑士与雷雨袭击者均可能被唤醒。'
    # 午夜热点提示。
    - '<prefix><#EDE9FE>午夜功能 ✦ 暗影热点与雷雨热点会提高局部危险度。'

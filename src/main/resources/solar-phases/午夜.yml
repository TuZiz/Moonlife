# 午夜：新月夜蛛、满月僵尸群和雷雨危险会静默增强。
enable: true
# 显示名称。
display-name: "午夜"
# 日相时间窗口配置根节点。
time:
  # 日相开始时间，使用 Minecraft 世界 tick。
  start: 18000
  # 日相结束时间，使用 Minecraft 世界 tick。
  end: 23000
# 该月相或日相启用的功能 ID 根节点。
functions:
  # 该相位启用的怪物规则 ID 列表。
  monsters:
    # 列表项：该列表中的一个配置值。
    - newmoon_night_spider
    # 列表项：该列表中的一个配置值。
    - fullmoon_zombie_pack
    # 列表项：该列表中的一个配置值。
    - thunder_skeleton_patrol
  # 祭坛配置根节点。
  altars: []
  # 该相位启用的作物规则 ID 列表。
  crops: []
  # 该相位启用的玩家状态规则 ID 列表。
  buffs:
    # 列表项：该列表中的一个配置值。
    - thunder_night_danger
  # 生态热点配置根节点。
  hotspots: []
# 该日相切换时的提示文本配置。
messages:
  # 是否公告该相位，轻生态中午夜静默，避免夜晚中途再次刷屏。
  announce: false
  # 日相变化广播提示。
  broadcast: '<prefix><#C4B5FD>午夜已至 ✦ <world> 的深夜生态达到峰值。'
  # 日相变化 ActionBar 提示。
  actionbar: '<#C4B5FD>☼ 当前日相：<#FFFFFF><phase></#FFFFFF>'
  # 日相变化 Title 主标题。
  title: '<#C4B5FD>☼ <phase>'
  # 日相变化 Title 副标题。
  subtitle: '<#EDE9FE>新月、满月与雷雨生态在午夜静默增强'
  # 日相变化 BossBar 提示。
  bossbar: '<#C4B5FD>午夜生态 ☼ <#FFFFFF><phase></#FFFFFF>'
  # 功能提示列表，仅当本文件 functions 中配置了功能时发送。
  features:
    # 午夜怪物提示。
    - '<prefix><#EDE9FE>午夜功能 ✦ 新月夜蛛、满月僵尸群与雷雨骷髅巡游会静默提高权重。'

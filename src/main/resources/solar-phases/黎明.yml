# 黎明：只做轻氛围切换，不做结算，不强迫玩家补流程。
enable: true
# 显示名称。
display-name: "黎明"
# 日相时间窗口配置根节点。
time:
  # 日相开始时间，使用 Minecraft 世界 tick。
  start: 23000
  # 日相结束时间，使用 Minecraft 世界 tick。
  end: 1000
# 该日相启用的功能 ID 根节点。
functions:
  # 黎明启用的怪物规则。
  monsters: []
  # 黎明启用的小型祭坛。
  altars: []
  # 黎明启用的作物规则。
  crops: []
  # 黎明启用的玩家状态规则。
  buffs: []
  # 黎明启用的生态热点。
  hotspots: []
  # 黎明启用的材料掉落规则。
  material-drops: []
# 该日相切换时的提示文本配置。
messages:
  # 是否公告该相位，黎明默认静默。
  announce: false
  # 日相变化广播提示。
  broadcast: '<prefix><#FDBA74>黎明微亮 ✦ <world> 的生态回到平稳节奏。'
  # 日相变化 ActionBar 提示。
  actionbar: '<#FDBA74>黎明</#FDBA74> <#94A3B8>·</#94A3B8> <#FFEDD5>新一天开始</#FFEDD5>'
  # 日相变化 Title 主标题。
  title: '<#FDBA74>☼ <phase>'
  # 日相变化 Title 副标题。
  subtitle: '<#FFEDD5>仅作氛围切换，不做结算'
  # 日相变化 BossBar 提示。
  bossbar: '<#FDBA74>黎明 ☼ <#FFFFFF><phase></#FFFFFF>'
  # 附加功能提示，默认不额外广播。
  features: []

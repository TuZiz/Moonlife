# 黎明：静默执行昨夜个人结算。
enable: true
# 显示名称。
display-name: "黎明"
# 日相时间窗口配置根节点。
time:
  # 日相开始时间，使用 Minecraft 世界 tick。
  start: 23000
  # 日相结束时间，使用 Minecraft 世界 tick。
  end: 1000
# 该月相或日相启用的功能 ID 根节点。
functions:
  # 该相位启用的怪物规则 ID 列表。
  monsters: []
  # 祭坛配置根节点。
  altars: []
  # 该相位启用的作物规则 ID 列表。
  crops: []
  # 该相位启用的玩家状态规则 ID 列表。
  buffs: []
  # 生态热点配置根节点。
  hotspots: []
# 该日相切换时的提示文本配置。
messages:
  # 是否公告该相位，轻生态中黎明静默，避免刷屏。
  announce: false
  # 日相变化广播提示。
  broadcast: '<prefix><#FDBA74>天光初醒 ✦ <world> 正进入 <#FFFFFF><phase></#FFFFFF>。'
  # 日相变化 ActionBar 提示。
  actionbar: '<#FDBA74>☼ 当前日相：<#FFFFFF><phase></#FFFFFF>'
  # 日相变化 Title 主标题。
  title: '<#FDBA74>☼ <phase>'
  # 日相变化 Title 副标题。
  subtitle: '<#FFEDD5>昨夜行为会在黎明静默结算'
  # 日相变化 BossBar 提示。
  bossbar: '<#FDBA74>日相 ☼ <#FFFFFF><phase></#FFFFFF>'

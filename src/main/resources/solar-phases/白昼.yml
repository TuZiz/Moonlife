# 白昼：晴天作物成长加速。
enable: true
# 显示名称。
display-name: "白昼"
# 日相时间窗口配置根节点。
time:
  # 日相开始时间，使用 Minecraft 世界 tick。
  start: 1000
  # 日相结束时间，使用 Minecraft 世界 tick。
  end: 11500
# 该月相或日相启用的功能 ID 根节点。
functions:
  # 该相位启用的怪物规则 ID 列表。
  monsters: []
  # 祭坛配置根节点。
  altars: []
  # 该相位启用的作物规则 ID 列表。
  crops:
    # 列表项：该列表中的一个配置值。
    - sunny_day_growth
  # 该相位启用的玩家状态规则 ID 列表。
  buffs: []
  # 生态热点配置根节点。
  hotspots: []

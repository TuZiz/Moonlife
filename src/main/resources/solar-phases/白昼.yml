# 白昼：晴天作物成长加速。
enable: true
# 显示名称。
display-name: "白昼"
# 日相时间窗口配置根节点。
time:
  # 日相开始时间，使用 Minecraft 世界 tick。
  start: 1000
  # 日相结束时间，使用 Minecraft 世界 tick。
  end: 11500
# 该月相或日相启用的功能 ID 根节点。
functions:
  # 该相位启用的怪物规则 ID 列表。
  monsters: []
  # 祭坛配置根节点。
  altars: []
  # 该相位启用的作物规则 ID 列表。
  crops:
    # 列表项：该列表中的一个配置值。
    - sunny_day_growth
  # 该相位启用的玩家状态规则 ID 列表。
  buffs: []
  # 生态热点配置根节点。
  hotspots: []
# 该日相切换时的提示文本配置。
messages:
  # 是否公告该相位，轻生态只公告白昼与夜晚。
  announce: true
  # 日相变化广播提示。
  broadcast: '<prefix><#86EFAC>白昼升起 ✦ <world> 今日生态：晴天促进作物成长，荒野危险降低。'
  # 日相变化 ActionBar 提示。
  actionbar: '<#86EFAC>白昼</#86EFAC> <#94A3B8>·</#94A3B8> <#BBF7D0>晴天作物成长提升</#BBF7D0> <#94A3B8>·</#94A3B8> <#E0F2FE>/ecology info</#E0F2FE>'
  # 日相变化 Title 主标题。
  title: '<#86EFAC>☼ <phase>'
  # 日相变化 Title 副标题。
  subtitle: '<#DCFCE7>晴天时作物成长加速'
  # 日相变化 BossBar 提示。
  bossbar: '<#86EFAC>白昼生态 ☼ <#FFFFFF><phase></#FFFFFF>'
  # 功能提示列表，仅当本文件 functions 中配置了功能时发送。
  features: []

# 夜晚：满月精英怪、雷雨夜危险和满月祭坛。
enable: true
# 显示名称。
display-name: "夜晚"
# 日相时间窗口配置根节点。
time:
  # 日相开始时间，使用 Minecraft 世界 tick。
  start: 13500
  # 日相结束时间，使用 Minecraft 世界 tick。
  end: 18000
# 该月相或日相启用的功能 ID 根节点。
functions:
  # 该相位启用的怪物规则 ID 列表。
  monsters:
    # 列表项：该列表中的一个配置值。
    - fullmoon_zombie_knight
    # 列表项：该列表中的一个配置值。
    - thunder_night_raider
  # 祭坛配置根节点。
  altars:
    # 列表项：该列表中的一个配置值。
    - fullmoon_altar
  # 该相位启用的作物规则 ID 列表。
  crops: []
  # 该相位启用的玩家状态规则 ID 列表。
  buffs:
    # 列表项：该列表中的一个配置值。
    - thunder_night_danger
  # 生态热点配置根节点。
  hotspots:
    # 列表项：该列表中的一个配置值。
    - thunder_night_hotspot

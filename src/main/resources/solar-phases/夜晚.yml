# 夜晚：服务危险探索、夜间怪物和少量风险收益。
enable: true
# 显示名称。
display-name: "夜晚"
# 日相时间窗口配置根节点。
time:
  # 日相开始时间，使用 Minecraft 世界 tick。
  start: 13500
  # 日相结束时间，使用 Minecraft 世界 tick。
  end: 18000
# 该日相启用的功能 ID 根节点。
functions:
  # 夜晚启用的怪物规则。
  monsters:
    # 满月夜晚会出现少量僵尸群。
    - fullmoon_zombie_pack
    # 雷雨夜晚会出现少量骷髅巡游。
    - thunder_skeleton_patrol
  # 夜晚启用的小型祭坛。
  altars:
    # 新月和残月可使用影尘灯盏。
    - shadow_lantern
    # 雷雨夜可使用雷骨避雷针。
    - stormbone_rod
  # 夜晚启用的作物规则。
  crops: []
  # 夜晚启用的玩家状态规则。
  buffs:
    # 雷雨夜高风险轻收益。
    - thunder_night_risk
    # 雨天河海边钓鱼幸运。
    - rain_angling_luck
  # 夜晚启用的生态热点。
  hotspots:
    # 暗沼边缘适合新月和残月夜间采集。
    - dark_swamp_edge
    # 河口湿地适合雨夜钓鱼。
    - river_mouth
    # 风暴山脊适合雷雨夜风险探索。
    - storm_ridge
  # 夜晚启用的材料掉落规则。
  material-drops:
    # 新月夜蛛掉落影尘。
    - newmoon_spider_shadow_dust
    # 新月和残月暗处采集掉落影尘。
    - dark_forest_shadow_gather
    # 满月夜钓鱼掉落月露种子。
    - fullmoon_fishing_moonlit_seed
    # 雷雨骷髅掉落雷骨碎片。
    - thunder_skeleton_stormbone
# 该日相切换时的提示文本配置。
messages:
  # 是否公告该相位，默认只公告白昼和夜晚。
  announce: true
  # 日相变化广播提示。
  broadcast: '<prefix><#93C5FD>夜幕降临 ✦ 荒野更危险，满月、新月和雷雨夜会出现轻量生态变化。'
  # 日相变化 ActionBar 提示。
  actionbar: '<#93C5FD>夜晚</#93C5FD> <#94A3B8>·</#94A3B8> <#DBEAFE>夜战 / 夜钓 / 暗处采集</#DBEAFE>'
  # 日相变化 Title 主标题。
  title: '<#93C5FD>☼ <phase>'
  # 日相变化 Title 副标题。
  subtitle: '<#DBEAFE>夜间生态开始活跃，但默认强度保持克制'
  # 日相变化 BossBar 提示。
  bossbar: '<#93C5FD>夜晚 ☼ <#FFFFFF><phase></#FFFFFF>'
  # 附加功能提示，默认不额外广播。
  features: []

# 黄昏：玩家获得采集、移动、经验和掉落收益。
enable: true
# 显示名称。
display-name: "黄昏"
# 日相时间窗口配置根节点。
time:
  # 日相开始时间，使用 Minecraft 世界 tick。
  start: 11500
  # 日相结束时间，使用 Minecraft 世界 tick。
  end: 13500
# 该月相或日相启用的功能 ID 根节点。
functions:
  # 该相位启用的怪物规则 ID 列表。
  monsters: []
  # 祭坛配置根节点。
  altars: []
  # 该相位启用的作物规则 ID 列表。
  crops: []
  # 该相位启用的玩家状态规则 ID 列表。
  buffs:
    # 列表项：该列表中的一个配置值。
    - dusk_forager
  # 生态热点配置根节点。
  hotspots: []
# 该日相切换时的提示文本配置。
messages:
  # 是否公告该相位，轻生态中黄昏静默，收益可通过 /ecology info 查看。
  announce: false
  # 日相变化广播提示。
  broadcast: '<prefix><#F0ABFC>黄昏降临 ✦ <world> 的荒野采集收益开始上浮。'
  # 日相变化 ActionBar 提示。
  actionbar: '<#F0ABFC>☼ 当前日相：<#FFFFFF><phase></#FFFFFF>'
  # 日相变化 Title 主标题。
  title: '<#F0ABFC>☼ <phase>'
  # 日相变化 Title 副标题。
  subtitle: '<#FAE8FF>野外采集、经验、掉落与移速获得加成'
  # 日相变化 BossBar 提示。
  bossbar: '<#F0ABFC>黄昏生态 ☼ <#FFFFFF><phase></#FFFFFF>'
  # 功能提示列表，仅当本文件 functions 中配置了功能时发送。
  features:
    # 黄昏采集者提示。
    - '<prefix><#FAE8FF>黄昏功能 ✦ 野外玩家获得采集、移动、经验与掉落收益。'

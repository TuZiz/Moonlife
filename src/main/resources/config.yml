# 是否开启调试输出，生产服建议保持 false。
debug: false
# 检查月相和日相变化的间隔 tick，低频世界级任务，不做每 tick 扫描。
phase-check-interval-ticks: 1200

# 月相系统通用设置根节点。
moon:
  # 月相启用世界配置根节点；留空表示所有普通世界启用。
  worlds:
    # 只启用月相系统的世界列表；留空表示不做白名单限制。
    enabled: []
    # 禁用月相系统的世界列表。
    disabled: []
  # 月相事件提示配置根节点。
  events:
    # 是否广播月相变化；轻生态默认由白昼/夜晚摘要统一提示。
    broadcast: false
    # 是否使用 ActionBar 提示月相变化；轻生态默认由日相 ActionBar 统一提示。
    actionbar: false
    # 是否使用 BossBar 提示月相变化。
    bossbar: false
    # 是否使用 Title 提示月相变化。
    title: false
    # 是否只在月亮可见时提示月相，避免白天出现月相提示。
    visible-only: true

# 日相系统通用设置根节点。
solar:
  # 日相启用世界配置根节点；留空表示所有普通世界启用。
  worlds:
    # 只启用日相系统的世界列表；留空表示不做白名单限制。
    enabled: []
    # 禁用日相系统的世界列表。
    disabled: []
  # 日相事件提示配置根节点。
  events:
    # 是否广播日相变化；轻生态默认只在白昼和夜晚发送摘要。
    broadcast: true
    # 是否使用 ActionBar 提示日相变化。
    actionbar: true
    # 是否使用 BossBar 提示日相变化。
    bossbar: false
    # 是否使用 Title 提示日相变化。
    title: false

# 性能保护配置根节点。
performance:
  # 是否根据 TPS/MSPT 自动跳过高成本生态逻辑。
  enabled: true
  # 允许执行生态刷新逻辑的最低 TPS。
  min-tps: 18.5
  # 允许执行生态刷新逻辑的最高 MSPT。
  max-mspt: 55.0

# 荒野判定配置根节点。
wilderness:
  # 是否启用荒野判定，关闭后所有位置都视为荒野。
  enabled: true
  # 是否接入 WorldGuard 区域判断，插件不存在时会自动跳过。
  respect-worldguard: true
  # 是否预留常见领地插件判断，当前为软 Hook，不强依赖。
  respect-residence-plugins: true
  # 不做荒野判定的世界列表。
  disabled-worlds: []

# 野外刷新运行时配置根节点。
spawn:
  # 是否启用生态刷怪服务。
  enabled: true
  # 是否强制怪物完全依赖 MythicMobs，轻生态默认关闭以使用原版生物。
  mythic-mobs-only: false
  # 每轮玩家附近抽样刷新间隔 tick。
  interval-ticks: 200
  # 每轮最多抽样多少名玩家，避免百人服全量遍历。
  max-player-samples-per-cycle: 24
  # 每名被抽样玩家每轮尝试多少个候选位置。
  attempts-per-player: 3
  # 候选刷新半径配置根节点。
  spawn-radius:
    # 候选点距离玩家的最小半径，基础配置调近，方便玩家明显感知月相生态。
    min: 12
    # 候选点距离玩家的最大半径，基础配置调近，仍保留一定野外感。
    max: 42
  # 清理失效追踪实体缓存的间隔 tick。
  cleanup-interval-ticks: 1200

# 作物系统运行时配置根节点。
crop:
  # 是否启用作物生态成长服务。
  enabled: true
  # 单次作物成长事件最多追加多少步额外成长。
  max-bonus-steps-per-event: 2

# 玩家增益系统运行时配置根节点。
buff:
  # 是否启用玩家生态状态服务。
  enabled: true
  # 玩家状态缓存刷新间隔 tick。
  refresh-interval-ticks: 100
  # 药水剩余时间高于该值时不重复刷新，避免视觉闪烁。
  potion-refresh-threshold-ticks: 80

# 玩家状态配置：这里只定义轻量 Buff，在哪些相位启用写到 moon-phases / solar-phases。
rules:
  # 黄昏采集者：黄昏适合在返程前采集和跑图。
  dusk_forager:
    # 规则唯一 ID。
    id: dusk_forager
    # 是否启用该规则。
    enable: true
    # 生效世界。
    worlds: [world]
    # 生效群系，留空表示不限制。
    biomes: []
    # 直接绑定月相，通常建议在月相文件中配置。
    moon-phases: []
    # 直接绑定日相，通常建议在日相文件中配置。
    solar-phases: []
    # 生效天气。
    weather: [CLEAR, RAIN]
    # 是否只在荒野区域生效。
    wilderness-only: true
    # 是否要求地下。
    underground: false
    # 是否要求玩家在水中。
    in-water: false
    # 是否要求玩家潜行。
    sneaking: false
    # 需要的权限，留空表示不需要。
    permission: ''
    # 药水效果配置。
    potion-effects:
      # 轻微采掘速度。
      dusk_haste:
        # 药水效果类型。
        type: FAST_DIGGING
        # 药水等级，从 0 开始。
        amplifier: 0
        # 持续 tick。
        duration-ticks: 220
        # 是否为环境效果。
        ambient: true
        # 是否显示粒子。
        particles: false
        # 是否显示图标。
        icon: true
    # 属性修饰器配置。
    attribute-modifiers:
      # 轻微移动速度。
      dusk_walk:
        # Bukkit 属性名。
        attribute: MOVEMENT_SPEED
        # 属性修饰量。
        amount: 0.025
        # 属性计算方式。
        operation: ADD_SCALAR
    # 玩家造成伤害倍率。
    damage-multiplier: 1.0
    # 经验获取倍率。
    experience-multiplier: 1.08
    # 实体掉落倍率。
    drop-multiplier: 1.06
    # 移动速度额外修正。
    movement-speed-modifier: 0.0
    # 攻击能力额外修正。
    attack-modifier: 0.0
    # 承伤抗性修正，正数表示减少受到的伤害。
    resistance-modifier: 0.0
    # 玩家自定义状态标签。
    custom-tags: [dusk_forager]
    # Buff 冲突策略。
    conflict-strategy: STACK
    # 规则优先级。
    priority: 20

  # 雨钓耐心：雨天在河海边钓鱼和采集更有价值。

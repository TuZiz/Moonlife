# 临时生态事件配置根节点，轻生态默认不主动启用。
events: {}

# 世界配置模板建议根节点。
world-templates:
  # 生存主世界轻生态建议。
  survival:
    # 列表项：该列表中的一个配置值。
    - "world: 使用原版怪物、作物成长、轻量玩家状态和出生林地热点"
    # 列表项：该列表中的一个配置值。
    - "monsters: 满月僵尸群 / 新月夜蛛 / 雷雨骷髅巡游"
    # 列表项：该列表中的一个配置值。
    - "bounties: 支持原版击杀、作物收获和群系探索"
  # 资源世界轻生态建议。
  resource:
    # 列表项：该列表中的一个配置值。
    - "resource_world: 可复制 survival 模板并提高资源群系热点倍率"
    # 列表项：该列表中的一个配置值。
    - "建议扩大 spawn.spawn-radius.max，但保留世界与区块上限"
  # 下界轻生态建议。
  nether:
    # 列表项：该列表中的一个配置值。
    - "world_nether: 默认只保留满月地狱疣作物规则"
    # 列表项：该列表中的一个配置值。
    - "如需下界怪物生态，可单独新增 VANILLA 规则并绑定下界世界"
  # 农业服模板建议。
  farming:
    # 列表项：该列表中的一个配置值。
    - "提高 sunny_day_growth 与 waxing_gibbous_growth 的额外收获概率"
    # 列表项：该列表中的一个配置值。
    - "保留黎明结算，但降低夜间怪物权重"
  # 探索服模板建议。
  exploration:
    # 列表项：该列表中的一个配置值。
    - "增加 VISIT_BIOME 类型悬赏，并给每个资源群系配置热点"
    # 列表项：该列表中的一个配置值。
    - "把 /ecology codex 作为长期探索目标入口"

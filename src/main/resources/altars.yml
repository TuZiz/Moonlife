# 祭坛收集目标配置根节点。
altars:
  # 月相收集盆：轻量收集目标，不启动大规模事件。
  cycle_collection_basin:
    # 显示名称。
    display-name: "月相收集盆"
    # 祭坛使用的方块材质。
    block: AMETHYST_BLOCK
    # 兼容旧版的消耗材质。
    cost: GLOWSTONE_DUST
    # 单次触发需要消耗的物品数量。
    cost-amount: 3
    # 启动祭坛需要匹配的自定义物品。
    cost-item:
      # 祭坛消耗物的基础材质。
      material: GLOWSTONE_DUST
      # 祭坛消耗物的显示名。
      display-name: "<#FDBA74>黎明露珠"
      # 祭坛消耗物的 lore。
      lore:
        # lore 第一行。
        - "<#A7F3D0>月息轻生态材料"
        # lore 第二行。
        - "<#94A3B8>来源：黎明结算与探索悬赏"
      # 祭坛消耗物的 custom-model-data。
      custom-model-data: 1001
      # 祭坛消耗物必须拥有的 NBT / PDC 标签。
      nbt:
        # 必须匹配的 Moonlife 物品 ID。
        "moonlife:item_id": dawn_dew
      # 祭坛消耗物匹配策略。
      match:
        # 是否匹配显示名。
        display-name: true
        # 是否匹配完整 lore。
        lore: false
        # 是否匹配 custom-model-data。
        custom-model-data: true
        # 是否匹配 NBT / PDC 标签。
        nbt: true
        # 显示名匹配模式：EXACT、PLAIN_EQUALS、PLAIN_CONTAINS、DISABLED。
        name-mode: EXACT
    # 规则直接绑定的月相列表，留空表示不限制。
    moon-phases: []
    # 规则直接绑定的日相列表。
    solar-phases: [DAWN, DAY]
    # 规则生效的天气列表，留空表示不限制。
    weather: []
    # 触发的生态事件 ID，留空表示只做收集结算。
    event-id: ''
    # 祭坛事件持续时间，单位为分钟。
    event-minutes: 1
    # 祭坛事件倍率。
    event-multiplier: 1.0
    # 完成收集目标奖励的经验值。
    reward-exp: 80
    # 完成收集目标奖励的生态材料 ID 列表。
    reward-materials: [cycle_badge]
    # 完成后解锁的生态图鉴条目 ID。
    codex-entry: cycle_basin

# 生态热点小地点配置根节点。
hotspots:
  # 出生林地：围绕世界出生点的小型探索热点。
  spawn_grove:
    # 显示名称。
    display-name: "出生林地"
    # 规则生效的世界列表。
    worlds: [world]
    # 规则生效的群系列表，留空表示不限制。
    biomes: [PLAINS, FOREST, CHERRY_GROVE]
    # 热点中心配置。
    center:
      # 中心模式，SPAWN 表示使用世界出生点。
      mode: SPAWN
      # 坐标模式下使用的 X 坐标。
      x: 0.0
      # 坐标模式下使用的 Y 坐标。
      y: 64.0
      # 坐标模式下使用的 Z 坐标。
      z: 0.0
      # 是否把 Y 轴纳入距离计算。
      use-y: false
    # 热点半径。
    radius: 128.0
    # 规则直接绑定的月相列表。
    moon-phases: [WAXING_CRESCENT, WAXING_GIBBOUS]
    # 规则直接绑定的日相列表，留空表示不限制。
    solar-phases: []
    # 规则生效的天气列表，留空表示不限制。
    weather: []
    # 热点或事件倍率。
    multiplier: 1.1
  # 河雾带：河流和沼泽形成的采集热点。
  river_mist:
    # 显示名称。
    display-name: "河雾带"
    # 规则生效的世界列表。
    worlds: [world]
    # 规则生效的群系列表。
    biomes: [RIVER, SWAMP, MANGROVE_SWAMP]
    # 热点中心配置，留空表示按群系生效。
    center: {}
    # 热点半径，中心留空时该值不参与判断。
    radius: 0.0
    # 规则直接绑定的月相列表。
    moon-phases: [WANING_GIBBOUS, WANING_CRESCENT]
    # 规则直接绑定的日相列表，留空表示不限制。
    solar-phases: []
    # 规则生效的天气列表，留空表示不限制。
    weather: [CLEAR, RAIN]
    # 热点或事件倍率。
    multiplier: 1.12
  # 旧矿回声：洞穴群系中的探索热点。
  old_mine_echo:
    # 显示名称。
    display-name: "旧矿回声"
    # 规则生效的世界列表。
    worlds: [world]
    # 规则生效的群系列表。
    biomes: [DRIPSTONE_CAVES, LUSH_CAVES]
    # 热点中心配置，留空表示按群系生效。
    center: {}
    # 热点半径，中心留空时该值不参与判断。
    radius: 0.0
    # 规则直接绑定的月相列表。
    moon-phases: [FIRST_QUARTER, LAST_QUARTER]
    # 规则直接绑定的日相列表，留空表示不限制。
    solar-phases: []
    # 规则生效的天气列表，留空表示不限制。
    weather: []
    # 热点或事件倍率。
    multiplier: 1.15

# 月相成就线配置根节点。
achievements:
  # 初识月息：完成一次黎明结算和一次晴天丰收。

# 轻生态扩展配置：这里集中定义生态材料、材料掉落、小型热点、轻量祭坛和可选扩展位。
calendar:
  # 日历向后预览的天数，数值越大输出越长。
  days: 8

# 调试 BossBar 配置根节点。
debug-bossbar:
  # 调试 BossBar 刷新间隔，单位为 tick，生产服建议不低于 40。
  refresh-ticks: 40

# 玩家生态保护配置根节点。
player-protection:
  # 新玩家在线保护时间，单位为 tick，默认不额外保护。
  new-player-ticks: 0
  # 出生点周围生态刷怪保护半径，避免出生点附近额外刷怪过密。
  spawn-radius: 24.0

# 生态材料定义根节点；默认只保留三种轻用途材料。
materials:
  # 影尘：新月、暗处采集和夜行生物相关的轻量材料。
  shadow_dust:
    # 服主和玩家看到的材料中文名。
    display-name: "影尘"
    # 材料对应的基础 Bukkit 物品。
    material: GUNPOWDER
    # 材料默认获取来源说明。
    source: "新月夜蛛、暗色蘑菇、沼泽与黑森林夜间采集"
    # 材料默认用途说明。
    usage: "夜视小祭坛、潜行探索辅助、暗色装饰和自定义夜间配方"
    # 生成给玩家的自定义物品配置。
    item:
      # 自定义物品基础材质。
      material: GUNPOWDER
      # 自定义物品显示名，支持 MiniMessage RGB。
      display-name: "<#9CA3AF>影尘"
      # 自定义物品 lore。
      lore:
        # lore 第一行。
        - "<#A7F3D0>Moonlife 轻生态材料"
        # lore 第二行。
        - "<#94A3B8>来源：新月夜行与暗处采集"
        # lore 第三行。
        - "<#64748B>用途：夜视小祭坛 / 潜行辅助 / 暗色装饰"
      # 自定义模型数据，材质包可选使用。
      custom-model-data: 1001
      # Bukkit PDC 标签，无 NMS。
      nbt:
        # Moonlife 物品 ID 标签。
        "moonlife:item_id": shadow_dust
  # 月露种子：农业、钓鱼和满月收获相关的轻量材料。
  moonlit_seed:
    # 服主和玩家看到的材料中文名。
    display-name: "月露种子"
    # 材料对应的基础 Bukkit 物品。
    material: WHEAT_SEEDS
    # 材料默认获取来源说明。
    source: "满月收获、盈凸月农田、雨天钓鱼与河岸采集"
    # 材料默认用途说明。
    usage: "轻农业祭坛、肥料感配方、生存食物和作物主题装饰"
    # 生成给玩家的自定义物品配置。
    item:
      # 自定义物品基础材质。
      material: WHEAT_SEEDS
      # 自定义物品显示名，支持 MiniMessage RGB。
      display-name: "<#C4B5FD>月露种子"
      # 自定义物品 lore。
      lore:
        # lore 第一行。
        - "<#A7F3D0>Moonlife 轻生态材料"
        # lore 第二行。
        - "<#94A3B8>来源：满月收获、雨天钓鱼和农田照料"
        # lore 第三行。
        - "<#64748B>用途：轻农业祭坛 / 肥料感配方 / 食物拓展"
      # 自定义模型数据，材质包可选使用。
      custom-model-data: 1002
      # Bukkit PDC 标签，无 NMS。
      nbt:
        # Moonlife 物品 ID 标签。
        "moonlife:item_id": moonlit_seed

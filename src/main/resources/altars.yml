# 轻量祭坛配置根节点；默认只提供一次性辅助用途，不做大型事件。
altars:
  # 影尘灯盏：夜晚用影尘换取短时夜视，服务夜间跑图。
  shadow_lantern:
    # 祭坛显示名。
    display-name: "影尘灯盏"
    # 祭坛方块，玩家右键该方块触发。
    block: SOUL_LANTERN
    # 兼容旧配置的基础消耗材质。
    cost: GUNPOWDER
    # 单次触发消耗数量。
    cost-amount: 1
    # 需要匹配的自定义材料物品。
    cost-item:
      # 消耗物基础材质。
      material: GUNPOWDER
      # 消耗物显示名。
      display-name: "<#9CA3AF>影尘"
      # 消耗物 lore。
      lore:
        # lore 第一行。
        - "<#A7F3D0>Moonlife 轻生态材料"
        # lore 第二行。
        - "<#94A3B8>来源：新月夜行与暗处采集"
        # lore 第三行。
        - "<#64748B>用途：夜视小祭坛 / 潜行辅助 / 暗色装饰"
      # 消耗物 custom-model-data。
      custom-model-data: 1001
      # 消耗物 NBT / PDC 标签。
      nbt:
        # 必须匹配的 Moonlife 物品 ID。
        "moonlife:item_id": shadow_dust
      # 消耗物匹配策略。
      match:
        # 是否匹配显示名。
        display-name: true
        # 是否匹配完整 lore。
        lore: false
        # 是否匹配 custom-model-data。
        custom-model-data: true
        # 是否匹配 NBT / PDC 标签。
        nbt: true
        # 显示名匹配模式。
        name-mode: EXACT
    # 生效月相。
    moon-phases: [NEW_MOON, WANING_CRESCENT]
    # 生效日相。
    solar-phases: [NIGHT, MIDNIGHT]
    # 生效天气，留空表示不限制。
    weather: []
    # 触发的临时生态事件，留空表示不触发事件。
    event-id: ''
    # 事件持续分钟，未使用事件时可保持默认。
    event-minutes: 1
    # 事件倍率，未使用事件时可保持 1.0。
    event-multiplier: 1.0
    # 触发奖励经验。
    reward-exp: 8
    # 触发奖励材料。
    reward-materials: []
    # 可选图鉴条目，留空表示不写入图鉴。
    codex-entry: ''
    # 给予玩家的短时效果。
    potion-effects:
      # 夜视效果。
      night_vision:
        # 药水类型。
        type: NIGHT_VISION
        # 药水等级，从 0 开始。
        amplifier: 0
        # 持续 tick。
        duration-ticks: 900
        # 是否为环境效果。
        ambient: true
        # 是否显示粒子。
        particles: false
        # 是否显示图标。
        icon: true
    # 视觉效果，NONE / LIGHTNING / SMOKE。

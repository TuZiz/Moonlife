# 轻生态扩展配置：材料、探索悬赏、热点小地点、成就线和收集目标集中在这里。
calendar:
  # 日历向后预览的天数。
  days: 8

# 调试 BossBar 配置根节点。
debug-bossbar:
  # 调试 BossBar 刷新间隔，单位为 tick。
  refresh-ticks: 40

# 玩家生态保护配置根节点。
player-protection:
  # 新玩家在线保护时间，单位为 tick，轻生态默认不额外保护。
  new-player-ticks: 0
  # 出生点周围生态刷怪保护半径。
  spawn-radius: 24.0

# 生态材料定义根节点。
materials:
  # 黎明露珠：黎明结算和探索奖励使用的基础材料。
  dawn_dew:
    # 显示名称。
    display-name: "黎明露珠"
    # 使用的 Bukkit 物品或方块材质名。
    material: GLOWSTONE_DUST
    # 生成给玩家的自定义物品配置。
    item:
      # 自定义物品的基础材质。
      material: GLOWSTONE_DUST
      # 自定义物品的显示名，支持 MiniMessage。
      display-name: "<#FDBA74>黎明露珠"
      # 自定义物品的 lore，支持 MiniMessage。
      lore:
        # lore 第一行。
        - "<#A7F3D0>月息轻生态材料"
        # lore 第二行。
        - "<#94A3B8>来源：黎明结算与探索悬赏"
      # 自定义模型数据，材质包可用该值绑定模型。
      custom-model-data: 1001
      # 自定义 NBT / PDC 标签，完全无 NMS。
      nbt:
        # Moonlife 物品 ID 标签。
        "moonlife:item_id": dawn_dew
    # 材料来源说明文本。
    source: "黎明结算与探索悬赏"
  # 月露种子：满月成熟作物偶然获得的材料。

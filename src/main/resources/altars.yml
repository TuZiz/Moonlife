# 生态悬赏配置根节点。
bounties:
  # 晴天丰收：白昼晴天收获成熟作物即可完成。
  sunny_harvest:
    # 显示名称。
    display-name: "晴天丰收"
    # 悬赏目标类型。
    objective: HARVEST_CROP
    # 悬赏匹配目标列表。
    targets: [WHEAT, CARROTS, POTATOES, BEETROOTS]
    # 悬赏生效的月相列表，留空表示不限制。
    moon-phases: []
    # 悬赏生效的日相列表。
    solar-phases: [DAY]
    # 悬赏生效的天气列表。
    weather: [CLEAR]
    # 完成悬赏奖励的经验值。
    reward-exp: 24
    # 完成悬赏奖励的生态材料 ID 列表。
    reward-materials: [verdant_grain]
    # 完成后解锁的生态图鉴条目 ID。
    codex-entry: sunny_harvest
  # 林地踏查：探索森林、平原或樱花林即可完成。
  grove_path:
    # 显示名称。
    display-name: "林地踏查"
    # 悬赏目标类型。
    objective: VISIT_BIOME
    # 悬赏匹配目标列表。
    targets: [FOREST, PLAINS, CHERRY_GROVE]
    # 悬赏生效的月相列表。
    moon-phases: [WAXING_CRESCENT, WAXING_GIBBOUS]
    # 悬赏生效的日相列表，留空表示不限制。
    solar-phases: []
    # 悬赏生效的天气列表，留空表示不限制。
    weather: []
    # 完成悬赏奖励的经验值。
    reward-exp: 30
    # 完成悬赏奖励的生态材料 ID 列表。
    reward-materials: [dawn_dew]
    # 完成后解锁的生态图鉴条目 ID。
    codex-entry: grove_path
  # 河岸巡游：亏凸月或残月探索河流和沼泽即可完成。
  river_walk:

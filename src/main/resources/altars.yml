# 轻生态扩展配置：默认不启用祭坛、悬赏、MythicMobs 材料和生态事件。
calendar:
  # 日历向后预览的天数。
  days: 8

# 调试 BossBar 配置根节点。
debug-bossbar:
  # 调试 BossBar 刷新间隔，单位为 tick。
  refresh-ticks: 40

# 玩家生态保护配置根节点。
player-protection:
  # 新玩家在线保护时间，单位为 tick，轻生态默认不额外保护。
  new-player-ticks: 0
  # 出生点周围生态刷怪保护半径。
  spawn-radius: 24.0

# 生态材料定义根节点，轻生态默认留空。
materials: {}

# 生态悬赏配置根节点，轻生态默认留空。
bounties: {}

# 祭坛配置根节点，轻生态默认留空。
altars: {}

# 生态热点配置根节点，轻生态默认留空。
hotspots: {}

# 临时生态事件配置根节点，轻生态默认留空。
events: {}

# 世界配置模板建议根节点。
world-templates:
  # 生存主世界轻生态建议。
  survival:
    # 列表项：该列表中的一个配置值。
    - "world: 使用原版怪物、作物成长和轻量玩家状态"
    # 列表项：该列表中的一个配置值。
    - "monsters: 满月僵尸群 / 新月夜蛛 / 雷雨骷髅巡游"
    # 列表项：该列表中的一个配置值。
    - "messages: 每个白昼或夜晚只发送一条聊天和一条 ActionBar"
  # 资源世界轻生态建议。
  resource:
    # 列表项：该列表中的一个配置值。
    - "resource_world: 可以缩短原版怪物冷却，但不建议提高世界上限"
    # 列表项：该列表中的一个配置值。
    - "建议保留荒野判定，避免出生点附近刷怪过密"
  # 下界轻生态建议。
  nether:
    # 列表项：该列表中的一个配置值。
    - "world_nether: 默认只保留满月地狱疣作物规则"
    # 列表项：该列表中的一个配置值。
    - "如需下界怪物生态，可单独新增 VANILLA 规则"

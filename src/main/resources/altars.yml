# 世界配置模板建议根节点，只作为 /ecology template 的说明文本。
world-templates:
  # 生存主世界建议。
  survival:
    # 模板建议第一行。
    - "主世界：保留原版怪物、轻作物偏好、雨钓、洞穴和野外采集热点。"
    # 模板建议第二行。
    - "推荐默认值：倍率不超过 1.25，材料掉落概率多数低于 5%。"
  # 资源世界建议。
  resource:
    # 模板建议第一行。
    - "资源世界：可以复制主世界规则，但提高材料冷却，避免刷资源。"
    # 模板建议第二行。
    - "建议扩大 spawn.spawn-radius.max，同时保持 world-limit 和 chunk-limit。"
  # 农业服建议。
  farming:
    # 模板建议第一行。
    - "农业服：优先调整 crops.yml 的作物差异，不建议直接大幅提高掉落。"
    # 模板建议第二行。
    - "月露种子可作为轻肥料和农产品兑换材料。"
  # 探索服建议。
  exploration:
    # 模板建议第一行。
    - "探索服：增加 hotspots 与 material-drops，而不是增加主线任务。"
    # 模板建议第二行。
    - "让森林、河口、洞穴、山地在不同天气和月相下略有差异。"

# 月相系统的世界配置根节点。
worlds:
  # 启用月相系统的世界列表，留空表示除 disabled 外全部启用。
  enabled: []
  # 禁用月相系统的世界列表。
  disabled:
    # 默认不在末地触发生存生态月相玩法。
    - world_the_end

# 月相变化事件表现配置根节点。
events:
  # 月相变化时是否发送全服广播。
  broadcast: true
  # 月相变化时是否给所在世界玩家发送 ActionBar。
  actionbar: true
  # 月相变化时是否显示 BossBar。
  bossbar: false
  # 月相变化时是否显示 Title。
  title: false

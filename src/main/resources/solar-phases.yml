# 日相系统的世界配置根节点。
worlds:
  # 启用日相系统的世界列表，留空表示除 disabled 外全部启用。
  enabled: []
  # 禁用日相系统的世界列表。
  disabled:
    # 默认不在末地触发生存生态日相玩法。
    - world_the_end

# 日相变化事件表现配置根节点。
events:
  # 日相变化时是否发送全服广播。
  broadcast: false
  # 日相变化时是否给所在世界玩家发送 ActionBar。
  actionbar: true
  # 日相变化时是否显示 BossBar。
  bossbar: false
  # 日相变化时是否显示 Title。
  title: false

# 日相 tick 区间配置根节点，支持跨 0 点的环绕区间。
phases:
  # 黎明配置。
  dawn:
    # 黎明开始 tick。
    start: 22500
    # 黎明结束 tick。
    end: 23999
  # 白昼配置。
  day:
    # 白昼开始 tick。
    start: 0
    # 白昼结束 tick。
    end: 11599
  # 黄昏配置。
  dusk:
    # 黄昏开始 tick。
    start: 11600
    # 黄昏结束 tick。
    end: 13799
  # 夜晚配置。
  night:
    # 夜晚开始 tick。
    start: 13800
    # 夜晚结束 tick。
    end: 17999
  # 午夜配置。
  midnight:
    # 午夜开始 tick。
    start: 18000
    # 午夜结束 tick。
    end: 22499

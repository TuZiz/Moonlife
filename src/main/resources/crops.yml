# 作物生态配置：这里只定义作物成长和收获差异，在哪些相位启用写到 moon-phases / solar-phases。
rules:
  # 晴天田垄：白昼晴天给基础农田轻微成长偏好。
  clear_day_field_growth:
    # 规则唯一 ID。
    id: clear_day_field_growth
    # 是否启用该规则。
    enable: true
    # 受影响的作物方块类型。
    crop-types: [WHEAT, CARROTS, BEETROOTS]
    # 生效世界。
    worlds: [world]
    # 生效群系，留空表示不限制。
    biomes: []
    # 直接绑定月相，通常建议在月相文件中配置。
    moon-phases: []
    # 直接绑定日相，通常建议在日相文件中配置。
    solar-phases: []
    # 生效天气。
    weather: [CLEAR]
    # 光照范围。
    light-range: [9, 15]
    # 可接受的土壤类型。
    soil-types: [FARMLAND]
    # 耕地湿润度范围。
    moisture: [5, 7]
    # 成长倍率，保守提高，不破坏原版农业节奏。
    growth-multiplier: 1.14
    # 额外成长概率。
    bonus-growth-chance: 0.06
    # 额外复制原版收获的概率。
    extra-harvest-chance: 0.02
    # 自定义额外收获物，留空表示命中后复制原版掉落。
    extra-harvest-items: {}
    # 作物变异概率，默认不启用。
    mutation-chance: 0.0
    # 变异方块材质，留空表示不变异。
    mutation-material: ''
    # 是否允许骨粉交互。
    bone-meal-interaction: true
    # 是否对自动化成长也生效。
    automation-apply: true
    # 规则优先级。
    priority: 20

  # 雨润根茎：雨天让根茎类作物略微舒服。
  rain_root_crop_growth:
    # 规则唯一 ID。
    id: rain_root_crop_growth
    # 是否启用该规则。
    enable: true
    # 受影响的作物方块类型。
    crop-types: [CARROTS, POTATOES, BEETROOTS]
    # 生效世界。
    worlds: [world]
    # 生效群系，留空表示不限制。
    biomes: []
    # 直接绑定月相，通常建议在月相文件中配置。
    moon-phases: []
    # 直接绑定日相，通常建议在日相文件中配置。
    solar-phases: []
    # 生效天气。
    weather: [RAIN]
    # 光照范围。
    light-range: [7, 15]
    # 可接受的土壤类型。
    soil-types: [FARMLAND]
    # 耕地湿润度范围。
    moisture: [4, 7]
    # 成长倍率。
    growth-multiplier: 1.12
    # 额外成长概率。
    bonus-growth-chance: 0.05
    # 额外复制原版收获的概率。
    extra-harvest-chance: 0.018
    # 自定义额外收获物，留空表示命中后复制原版掉落。
    extra-harvest-items: {}
    # 作物变异概率，默认不启用。
    mutation-chance: 0.0
    # 变异方块材质，留空表示不变异。
    mutation-material: ''
    # 是否允许骨粉交互。
    bone-meal-interaction: true
    # 是否对自动化成长也生效。
    automation-apply: true
    # 规则优先级。
    priority: 22

  # 盈凸月农田：盈凸月让常见农作物与瓜类茎略微更稳定。
  waxing_gibbous_field_care:
    # 规则唯一 ID。
    id: waxing_gibbous_field_care
    # 是否启用该规则。
    enable: true
    # 受影响的作物方块类型。
    crop-types: [WHEAT, CARROTS, POTATOES, BEETROOTS, PUMPKIN_STEM, MELON_STEM]
    # 生效世界。
    worlds: [world]
    # 生效群系，留空表示不限制。
    biomes: []
    # 直接绑定月相，通常建议在月相文件中配置。
    moon-phases: []
    # 直接绑定日相，通常建议在日相文件中配置。
    solar-phases: []
    # 生效天气。
    weather: [CLEAR, RAIN]
    # 光照范围。
    light-range: [8, 15]
    # 可接受的土壤类型。
    soil-types: [FARMLAND]
    # 耕地湿润度范围。
    moisture: [4, 7]
    # 成长倍率。
    growth-multiplier: 1.18
    # 额外成长概率。
    bonus-growth-chance: 0.08
    # 额外复制原版收获的概率。
    extra-harvest-chance: 0.025
    # 自定义额外收获物，留空表示命中后复制原版掉落。
    extra-harvest-items: {}
    # 作物变异概率，默认不启用。
    mutation-chance: 0.0
    # 变异方块材质，留空表示不变异。
    mutation-material: ''
    # 是否允许骨粉交互。
    bone-meal-interaction: true
    # 是否对自动化成长也生效。
    automation-apply: true
    # 规则优先级。
    priority: 30

  # 满月下界疣：满月让下界疣有轻微成长偏好。
  fullmoon_nether_wart:
    # 规则唯一 ID。
    id: fullmoon_nether_wart
    # 是否启用该规则。
    enable: true
    # 受影响的作物方块类型。
    crop-types: [NETHER_WART]
    # 生效世界。
    worlds: [world_nether]
    # 生效群系，留空表示不限制。
    biomes: []
    # 直接绑定月相，通常建议在月相文件中配置。
    moon-phases: []
    # 直接绑定日相，通常建议在日相文件中配置。
    solar-phases: []
    # 生效天气，留空表示不限制。
    weather: []
    # 光照范围。
    light-range: [0, 15]
    # 可接受的土壤类型。
    soil-types: [SOUL_SAND]
    # 耕地湿润度范围。
    moisture: [0, 7]
    # 成长倍率。
    growth-multiplier: 1.10
    # 额外成长概率。
    bonus-growth-chance: 0.04
    # 额外复制原版收获的概率。
    extra-harvest-chance: 0.02
    # 自定义额外收获物，留空表示命中后复制原版掉落。
    extra-harvest-items: {}
    # 作物变异概率，默认不启用。
    mutation-chance: 0.0
    # 变异方块材质，留空表示不变异。
    mutation-material: ''
    # 是否允许骨粉交互。
    bone-meal-interaction: true
    # 是否对自动化成长也生效。
    automation-apply: true
    # 规则优先级。
    priority: 15

# 作物生态配置：这里只定义作物规则本身，在哪些月相/日相启用写到对应相位文件。
rules:
  # 晴天白昼作物成长加速：由 solar-phases/白昼.yml 启用。
  sunny_day_growth:
    # 规则唯一 ID。
    id: sunny_day_growth
    # 是否启用该规则或相位文件。
    enable: true
    # 受该规则影响的作物方块类型列表。
    crop-types: [WHEAT, CARROTS, POTATOES, BEETROOTS, PUMPKIN_STEM, MELON_STEM, NETHER_WART]
    # 规则生效的世界列表，留空表示不限制。
    worlds: [world]
    # 规则生效的群系列表，留空表示不限制。
    biomes: []
    # 规则直接绑定的月相列表，通常建议在 moon-phases 目录中配置。
    moon-phases: []
    # 规则直接绑定的日相列表，通常建议在 solar-phases 目录中配置。
    solar-phases: []
    # 规则生效的天气列表。
    weather: [CLEAR]
    # 允许刷怪或生效的光照范围。
    light-range: [9, 15]
    # 允许的土壤或承载方块类型列表。
    soil-types: [FARMLAND, SOUL_SAND]
    # 耕地湿润度范围。
    moisture: [5, 7]
    # 作物成长倍率。
    growth-multiplier: 1.35
    # 额外成长概率。
    bonus-growth-chance: 0.12
    # 额外收获概率。
    extra-harvest-chance: 0.06
    # 作物变异概率。
    mutation-chance: 0.005
    # 变异产物材质，留空表示不产出。
    mutation-material: ''
    # 是否影响骨粉催熟。
    bone-meal-interaction: true
    # 是否对自动化触发也生效。
    automation-apply: true
    # 规则优先级，数值越高越先匹配。
    priority: 20

  # 满月地狱疣：由 moon-phases/满月.yml 启用。
  fullmoon_nether_wart:
    # 规则唯一 ID。
    id: fullmoon_nether_wart
    # 是否启用该规则或相位文件。
    enable: true
    # 受该规则影响的作物方块类型列表。
    crop-types: [NETHER_WART]
    # 规则生效的世界列表，留空表示不限制。
    worlds: [world_nether]
    # 规则生效的群系列表，留空表示不限制。
    biomes: []
    # 规则直接绑定的月相列表，通常建议在 moon-phases 目录中配置。
    moon-phases: []
    # 规则直接绑定的日相列表，通常建议在 solar-phases 目录中配置。
    solar-phases: []
    # 规则生效的天气列表。
    weather: []
    # 允许刷怪或生效的光照范围。
    light-range: [0, 15]
    # 允许的土壤或承载方块类型列表。
    soil-types: [SOUL_SAND]
    # 耕地湿润度范围。
    moisture: [0, 7]
    # 作物成长倍率。
    growth-multiplier: 1.15
    # 额外成长概率。
    bonus-growth-chance: 0.05
    # 额外收获概率。
    extra-harvest-chance: 0.04
    # 作物变异概率。
    mutation-chance: 0.0
    # 变异产物材质，留空表示不产出。
    mutation-material: ''
    # 是否影响骨粉催熟。
    bone-meal-interaction: true
    # 是否对自动化触发也生效。
    automation-apply: true
    # 规则优先级，数值越高越先匹配。
    priority: 10
